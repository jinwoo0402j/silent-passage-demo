      renderShelterDialogue();
      scheduleShelterDialogueFrame();
      return true;
    }

    function startShelterScriptedDialogue(event, options = {}) {
      const node = getShelterScriptedEventNode(event, event?.startNodeId);
      if (!event?.id || !node) return false;
      shelterDialogueState = {
        ...createShelterDialogueState(),
        active: true,
        mode: "line",
        event,
        node,
        choices: getShelterNodeChoices(event, node),
        emotion: normalizeShelterTalkEmotion(node.emotion, normalizeShelterTalkEmotion(event.emotion, "neutral"))
      };
      const baseArt = getShelterEventStartArtAssetKey(event, node);
      setShelterDialogueArt(getShelterDialogueArtAssetKey(shelterDialogueState.emotion, baseArt));
      setShelterDialogueLine(String(node.line || event.title || "").trim() || "......");
      if (options.transition !== false) {
        beginShelterDialogueTransition("in");
      }
      renderShelterDialogue();
      return true;
    }

    function startShelterGenericDialogue() {
      shelterDialogueState = {
        ...createShelterDialogueState(),
        active: true,
        mode: "line",
        choices: getShelterGenericChoices(),
        emotion: "neutral"
      };
      setShelterDialogueArt(getShelterDialogueArtAssetKey("neutral", "shelterHomeCharmCg"));
      setShelterDialogueLine("……말해도 돼. 듣고 있어.");
      beginShelterDialogueTransition("in");
      renderShelterDialogue();
      return true;
    }

    function startShelterDialogue(options = {}) {
      if (activePanel) {
        closePanel();
      }
      const meta = loadMetaState();
      const event = getNextShelterScriptedEvent(meta, { autoOnly: Boolean(options.autoOnly) });
      if (event) {
        const bridge = getShelterEventBridgeConfig(event);
        if (options.autoOnly && bridge.line) {
          return startShelterBridgeDialogue(event, bridge);
        }
        return startShelterScriptedDialogue(event);
      }
      return options.autoOnly ? false : startShelterGenericDialogue();
    }

    function createShelterEventResult(choice, event, changed) {
      const effects = choice?.effects && typeof choice.effects === "object" ? choice.effects : {};
      const lines = [];
      if (Number.isFinite(effects.trust) && Number(effects.trust) !== 0) {
        const trustDelta = Math.round(Number(effects.trust) * 100);
        lines.push(`신뢰도 ${trustDelta > 0 ? "+" : ""}${trustDelta}`);
      }
      if (changed || choice?.endEvent !== false) {
        lines.push("기록 갱신");
      }
      return lines.length ? lines : ["변화 없음"];
    }

    function applyShelterEventChoiceEffects(choice) {
      if (!choice?.eventId) return { meta: loadMetaState(), changed: false };
      const meta = loadMetaState();
      let changed = false;
      const effects = choice.effects && typeof choice.effects === "object" ? choice.effects : {};
      if (Number.isFinite(effects.trust)) {
        meta.trust = clamp(Number(meta.trust || 0) + Number(effects.trust), -1, 1);
        changed = true;
      }
      if (Array.isArray(effects.storyFlags)) {
        effects.storyFlags.forEach((flag) => {
          changed = addMetaStoryFlag(meta, String(flag || "")) || changed;
        });
      }
      const event = getShelterScriptedEvent(choice.eventId);
      if (event && choice.endEvent !== false && !choice.nextNodeId) {
        changed = addMetaStoryFlag(meta, getShelterEventCompletionFlag(event)) || changed;
      }
      return { meta: changed ? saveMetaState(meta) : meta, changed };
    }

    function commitShelterGenericChoice(choice) {
      shelterDialogueState.requestId += 1;
      shelterDialogueState.topicIndex = (shelterDialogueState.topicIndex + 1) % SHELTER_DIALOGUE_GENERIC_CHOICES.length;
      shelterDialogueState.mode = "line";
      shelterDialogueState.choices = [];
      shelterDialogueState.choiceIndex = 0;
      shelterDialogueState.afterLine = "generic-choices";
      shelterDialogueState.resultLines = [];
      shelterDialogueState.emotion = normalizeShelterTalkEmotion(choice.emotion, "neutral");
      setShelterDialogueArt(getShelterDialogueArtAssetKey(shelterDialogueState.emotion, "shelterHomeCharmCg"));
      setShelterDialogueLine(choice.reply || "......");
      renderShelterDialogue();
    }

    function commitShelterEventChoice(choice) {
      const event = getShelterScriptedEvent(choice.eventId);
      if (!event) return;
      const nextNode = choice.nextNodeId ? getShelterScriptedEventNode(event, choice.nextNodeId) : null;
      const nextEmotion = normalizeShelterTalkEmotion(choice.emotion, normalizeShelterTalkEmotion(nextNode?.emotion, shelterDialogueState.emotion));
      const artAssetKey = normalizeShelterArtAssetKey(choice.backgroundAssetKey)
        || normalizeShelterArtAssetKey(choice.artAssetKey)
        || getShelterEventStartArtAssetKey(event, nextNode)
        || shelterDialogueState.artAssetKey;

      shelterDialogueState.mode = "line";
      shelterDialogueState.choiceIndex = 0;
      shelterDialogueState.resultLines = [];
      shelterDialogueState.emotion = nextEmotion;
      setShelterDialogueArt(getShelterDialogueArtAssetKey(nextEmotion, artAssetKey));

      if (nextNode) {
        shelterDialogueState.event = event;
        shelterDialogueState.node = nextNode;
        shelterDialogueState.choices = getShelterNodeChoices(event, nextNode);
        shelterDialogueState.afterLine = "";
        setShelterDialogueLine(String(nextNode.line || choice.reply || "").trim() || "......");
        renderShelterDialogue();
        return;
      }

      const { changed } = applyShelterEventChoiceEffects(choice);
      shelterDialogueState.choices = [];
      shelterDialogueState.afterLine = "event-result";
      shelterDialogueState.resultLines = createShelterEventResult(choice, event, changed);
      setShelterDialogueLine(String(choice.reply || "").trim() || "......");
      renderShelterDialogue();
    }

    function selectShelterDialogueChoice(index = shelterDialogueState.choiceIndex) {
      const choices = shelterDialogueState.choices;
      if (
        !shelterDialogueState.active
        || !(shelterDialogueState.mode === "choices" || canRevealShelterDialogueChoices())
        || !choices.length
      ) return;
      const choice = choices[clamp(Math.floor(index || 0), 0, choices.length - 1)];
      if (!choice) return;
      if (choice.eventId) {
        commitShelterEventChoice(choice);
      } else {
        commitShelterGenericChoice(choice);
      }
    }

    function finalizeShelterDialogueClose() {
      if (shelterDialogueFrameId) {
        window.cancelAnimationFrame(shelterDialogueFrameId);
        shelterDialogueFrameId = 0;
      }
      shelterDialogueState = createShelterDialogueState();
      renderShelterDialogue();
      if (currentZoneId === "living") {
        setFocusedHotspot(focusedIndex, true);
      } else {
        updateZoneUi();
      }
    }

    function closeShelterDialogue(force = false) {
      if (!shelterDialogueState.active || force) {
        finalizeShelterDialogueClose();
        return;
      }
      if (shelterDialogueState.transition?.direction === "out") {
        return;
      }
      shelterDialogueState.closing = true;
      beginShelterDialogueTransition("out");
      renderShelterDialogue();
    }

    function advanceShelterDialogueLine() {
      if (!shelterDialogueState.active) return;
      if (shelterDialogueState.transition) return;
      if (shelterDialogueState.mode === "bridge") {
        finishShelterBridge();
        return;
      }
      if (shelterDialogueState.mode === "choices" || canRevealShelterDialogueChoices()) {
        selectShelterDialogueChoice();
        return;
      }
      if (shelterDialogueState.mode === "result") {
        closeShelterDialogue();
        return;
      }
      if (!isShelterDialogueLineTypedComplete()) {
        shelterDialogueState.lineForcedComplete = true;
        renderShelterDialogue();
        return;
      }
      const maxIndex = Math.max(0, shelterDialogueState.lineSegments.length - 1);
      if (shelterDialogueState.lineIndex < maxIndex) {
        shelterDialogueState.lineIndex += 1;
        markShelterDialogueLineStarted();
        renderShelterDialogue();
        return;
      }
      if (shelterDialogueState.afterLine === "event-result") {
        shelterDialogueState.mode = "result";
        shelterDialogueState.afterLine = "";
        renderShelterDialogue();
        return;
      }
      if (shelterDialogueState.afterLine === "generic-choices") {
        shelterDialogueState.mode = "choices";
        shelterDialogueState.afterLine = "";
        if (!shelterDialogueState.choices.length) {
          shelterDialogueState.choices = getShelterGenericChoices();
        }
        shelterDialogueState.choiceIndex = 0;
        renderShelterDialogue();
        return;
      }
      if (shelterDialogueState.choices.length) {
        shelterDialogueState.mode = "choices";
        renderShelterDialogue();
        return;
      }
      closeShelterDialogue();
    }

    function handleShelterDialogueKey(event) {
      if (!shelterDialogueState.active) return false;
      if (shelterDialogueState.transition) return true;
      if (event.key === "Escape") {
        closeShelterDialogue();
        return true;
      }
      if ((shelterDialogueState.mode === "choices" || canRevealShelterDialogueChoices()) && shelterDialogueState.choices.length) {
        if (SHELTER_DIALOGUE_UP_KEYS.has(event.key)) {
          shelterDialogueState.choiceIndex = (shelterDialogueState.choiceIndex + shelterDialogueState.choices.length - 1) % shelterDialogueState.choices.length;
          renderShelterDialogue();
          return true;
        }
        if (SHELTER_DIALOGUE_DOWN_KEYS.has(event.key)) {
          shelterDialogueState.choiceIndex = (shelterDialogueState.choiceIndex + 1) % shelterDialogueState.choices.length;
          renderShelterDialogue();
          return true;
        }
      }
      if (SHELTER_DIALOGUE_CONFIRM_KEYS.has(event.key)) {
        advanceShelterDialogueLine();
        return true;
      }
      return true;
    }

    function queueShelterAutoDialogue() {
      const params = new URLSearchParams(window.location.search);
      const entry = params.get("entry") || "";
      if (entry !== "new" && entry !== "return") return;
      const delay = params.get("arrival") === SHELTER_ARRIVAL.queryValue
        ? SHELTER_ARRIVAL.holdMs + SHELTER_ARRIVAL.fadeMs + 120
        : 260;
      window.setTimeout(() => {
        if (!activePanel && !shelterDialogueState.active) {
          startShelterDialogue({ autoOnly: true });
        }
      }, delay);
    }

    function getSlotLabel(slot) {
      return PART_SLOT_LABELS[slot] || String(slot || "SLOT").toUpperCase();
    }

    function getPartStatLines(part) {
      const stats = part?.statModifiers || {};
      const lines = [];
      if (Number.isFinite(stats.recoilMultiplier)) {
        lines.push(`recoil x${Number(stats.recoilMultiplier).toFixed(2)}`);
      }
      if (Number.isFinite(stats.spreadMultiplier)) {
        lines.push(`spread x${Number(stats.spreadMultiplier).toFixed(2)}`);
      }
      if (Number.isFinite(stats.humanoidDamageBonus)) {
        lines.push(`humanoid +${Number(stats.humanoidDamageBonus)}`);
      }
      if (Number.isFinite(stats.magazineBonus)) {
        lines.push(`mag +${Number(stats.magazineBonus)}`);
      }
      return lines;
    }

    function renderPartStats(part) {
      const stats = getPartStatLines(part);
      if (!stats.length) {
        return "";
      }
      return `<div class="part-stats">${stats.map((line) => `<span class="part-stat">${escapeHtml(line)}</span>`).join("")}</div>`;
    }

    function getAttachedPart(meta, slot) {
      return meta.attachedParts.find((part) => part.slot === slot) || null;
    }

    function getMemoryDrift(meta) {
      return meta.attachedParts.reduce((total, part) => total + Math.max(0, Number(part.memoryResidue ?? part.corruption ?? 0)), 0);
    }

    function attachWorkshopPart(partId) {
      const meta = loadMetaState();
      const part = normalizePartInstance(meta.partInventory.find((entry) => entry.id === partId));
      if (!part) {
        return null;
      }
      meta.attachedParts = meta.attachedParts.filter((entry) => entry.slot !== part.slot);
      meta.attachedParts.push(part);
      return saveMetaState(meta);
    }

    function detachWorkshopSlot(slot) {
      const meta = loadMetaState();
      meta.attachedParts = meta.attachedParts.filter((entry) => entry.slot !== slot);
      return saveMetaState(meta);
    }

    function renderWorkshopSlots(meta) {
      return WORKSHOP_SLOT_ORDER.map((slot) => {
        const part = getAttachedPart(meta, slot);
        if (!part) {
          return `
            <article class="slot-card is-empty">
              <div class="slot-card-header">
                <span class="slot-label">${escapeHtml(getSlotLabel(slot))}</span>
                <span class="part-slot">EMPTY</span>
              </div>
              <div class="part-description">No module installed.</div>
            </article>
          `;
        }
        return `
          <article class="slot-card is-filled">
            <div class="slot-card-header">
              <span class="slot-label">${escapeHtml(getSlotLabel(slot))}</span>
              <span class="part-risk">MR ${Math.round(part.memoryResidue ?? part.corruption ?? 0)}</span>
            </div>
            <div class="part-name">${escapeHtml(part.name)}</div>
            ${renderPartStats(part)}
            <button class="workshop-button" type="button" data-workshop-action="detach" data-slot="${escapeHtml(slot)}">DETACH</button>
          </article>
        `;
      }).join("");
    }

    function renderWorkshopInventory(meta) {
      if (!meta.partInventory.length) {
        return `
          <article class="part-card is-empty">
            <div class="part-name">No recovered parts</div>
            <div class="part-description">Recovered modules appear here after expedition.</div>
          </article>
        `;
      }
      return meta.partInventory.map((part) => {
        const attached = Boolean(getAttachedPart(meta, part.slot)?.id === part.id);
        return `
          <article class="part-card${attached ? " is-attached" : ""}">
            <div class="part-card-header">
              <span class="part-name">${escapeHtml(part.name)}</span>
              <span class="part-slot">${escapeHtml(getSlotLabel(part.slot))}</span>
            </div>
            <div class="part-description">${escapeHtml(part.description || part.originLabel || "Recovered module.")}</div>
            ${renderPartStats(part)}
            <button class="workshop-button" type="button" data-workshop-action="attach" data-part-id="${escapeHtml(part.id)}"${attached ? " disabled" : ""}>${attached ? "ATTACHED" : "ATTACH"}</button>
          </article>
        `;
      }).join("");
    }

    function renderPartWorkshopPanel(statusText = "") {
      const meta = loadMetaState();
      syncWorkshopMetaDataset(meta);
      activePanel = "WORKSHOP";
      panelTitle.textContent = "WORKSHOP / PARTS";
      panelBody.className = "panel-body is-workshop";
      panelBody.innerHTML = `
        <div class="workshop-summary">
          <strong>Recovered modules ${meta.partInventory.length} / Attached ${meta.attachedParts.length}</strong>
          <span>Memory drift ${Math.round(getMemoryDrift(meta))}${statusText ? ` / ${escapeHtml(statusText)}` : ""}</span>
        </div>
        <div class="workshop-grid">
          <section class="workshop-column">
            <div class="workshop-heading">slots</div>
            ${renderWorkshopSlots(meta)}
          </section>
          <section class="workshop-column">
            <div class="workshop-heading">inventory</div>
            ${renderWorkshopInventory(meta)}
          </section>
        </div>
      `;
      modal.classList.add("is-open");
      modal.setAttribute("aria-hidden", "false");
      document.documentElement.dataset.activeShelterPanel = "WORKSHOP";
      panelBody.querySelectorAll("[data-workshop-action='attach']").forEach((button) => {
        button.addEventListener("click", () => {
          const partId = button.dataset.partId || "";
          const next = attachWorkshopPart(partId);
          const part = next?.attachedParts.find((entry) => entry.id === partId);
          renderPartWorkshopPanel(part ? `${part.name} installed` : "install failed");
        });
      });
      panelBody.querySelectorAll("[data-workshop-action='detach']").forEach((button) => {
        button.addEventListener("click", () => {
          detachWorkshopSlot(button.dataset.slot || "");
          renderPartWorkshopPanel("slot cleared");
        });
      });
      panelBody.querySelector("button:not([disabled])")?.focus();
    }

    function createStageEntryUrl(state) {
      const params = new URLSearchParams();
      params.set("directLevel", "1");
      params.set("entry", "shelter");
      params.set("stage", String(Math.max(1, Math.floor(Number(state.stage) || 1))));
      return `${GAME_ENTRY_PATH}?${params.toString()}`;
    }

    // SAVE-DRIVEN VISUALS: sanity is not shown as a bare number in the room.
    // Instead it subtly changes the warmth/brightness around the child.
    function syncSaveDrivenVisuals() {
      const light = 0.45 + saveState.sanity / 100 * 0.75;
      document.documentElement.style.setProperty("--sanity-light", light.toFixed(3));
      document.documentElement.dataset.shelterSanity = String(saveState.sanity);
      document.documentElement.dataset.shelterCycle = String(saveState.cycle);
      document.documentElement.dataset.shelterDay = String(saveState.day);
    }

    function applyArrivalFade() {
      const params = new URLSearchParams(window.location.search);
      const isDroneWakeArrival = params.get("arrival") === SHELTER_ARRIVAL.queryValue;
      document.documentElement.dataset.shelterArrival = isDroneWakeArrival ? "drone-wake" : "direct";
      document.documentElement.dataset.shelterArrivalFadeMs = String(SHELTER_ARRIVAL.fadeMs);

      if (!isDroneWakeArrival) {
        document.body.classList.add("is-arrival-ready");
        document.documentElement.dataset.shelterArrivalReady = "true";
        return;
      }

      document.body.classList.add("is-arriving");
      document.documentElement.dataset.shelterArrivalReady = "false";
      window.setTimeout(() => {
        document.body.classList.add("is-arrival-ready");
        document.body.classList.remove("is-arriving");
        document.documentElement.dataset.shelterArrivalReady = "true";
      }, SHELTER_ARRIVAL.holdMs);
    }

    function setupShelterBackground() {
      if (!shelterBgImage) return;
      shelterBgImage.onload = () => {
        document.documentElement.dataset.shelterBackground = "asset:shelter_bg.png";
        document.documentElement.dataset.assetFallback = "asset:shelter_bg.png";
        if (currentZoneId === "living") setActiveZoneSurface(ZONES.living);
      };
      shelterBgImage.onerror = () => {
        shelterBgImage.hidden = true;
        document.documentElement.dataset.shelterBackground = "missing:shelter_bg.png";
        document.documentElement.dataset.assetFallback = "missing:shelter_bg.png";
        if (currentZoneId === "living") setActiveZoneSurface({
          ...ZONES.living,
          kind: "placeholder",
          placeholderTitle: "LIVING",
          placeholderSubtitle: "missing shelter_bg.png; using placeholder"
        });
      };
      shelterBgImage.src = ART_HOOKS.shelter.backgroundSrc;
    }

    function createDustMotes() {
      if (!roomLife || roomLife.dataset.dustReady === "true") return;
      for (let i = 0; i < 26; i += 1) {
        const mote = document.createElement("span");
        mote.className = "dust-mote";
        mote.style.left = `${18 + Math.random() * 62}%`;
        mote.style.top = `${22 + Math.random() * 58}%`;
        mote.style.setProperty("--dust-dur", `${10 + Math.random() * 13}s`);
        mote.style.setProperty("--dust-delay", `${-Math.random() * 16}s`);
        roomLife.append(mote);
      }
      roomLife.dataset.dustReady = "true";
    }

    function showChildLine(text, duration = 2600) {
      if (!text || !childAmbientLine) return;
      window.clearTimeout(childLineTimer);
      childAmbientLine.textContent = text;
      childAmbientLine.classList.add("is-visible");
      document.documentElement.dataset.childAmbientLine = text;
      childLineTimer = window.setTimeout(() => {
        childAmbientLine.classList.remove("is-visible");
        document.documentElement.dataset.childAmbientLine = "";
      }, duration);
    }

    function setChildBehavior(index, reason = "loop") {
      childBehaviorIndex = (index + CHILD_BEHAVIORS.length) % CHILD_BEHAVIORS.length;
      const behavior = CHILD_BEHAVIORS[childBehaviorIndex];
      document.documentElement.style.setProperty("--child-x", `${behavior.x}%`);
      document.documentElement.style.setProperty("--child-y", `${behavior.y}%`);
      childActor.dataset.behavior = behavior.id;
      document.documentElement.dataset.childBehavior = behavior.id;

      if (reason === "loop" && behavior.line && Math.random() > 0.38) {
        window.setTimeout(() => showChildLine(behavior.line, 2300), 1200);
      }
      shelterAudio.playChildMovement();
    }

    function scheduleNextChildBehavior() {
      window.clearTimeout(childBehaviorTimer);
      const behavior = CHILD_BEHAVIORS[childBehaviorIndex] || CHILD_BEHAVIORS[0];
      childBehaviorTimer = window.setTimeout(() => {
        setChildBehavior(childBehaviorIndex + 1, "loop");
        scheduleNextChildBehavior();
      }, behavior.duration);
    }

    function startChildLifeLoop() {
      setChildBehavior(4, "arrival");
      scheduleNextChildBehavior();
    }

    function setDroneLook(x, y, source = "pointer") {
      droneLook.x = clamp(x, 0.02, 0.98);
      droneLook.y = clamp(y, 0.02, 0.98);
      droneLook.source = source;
      if (source !== "idle-drift") {
        droneLook.lastMovedAt = performance.now();
      }

      const driftX = (0.5 - droneLook.x) * ZONE_TRANSITION.parallaxPx;
      const driftY = (0.5 - droneLook.y) * (ZONE_TRANSITION.parallaxPx * 0.66);
      const nearScale = ZONE_TRANSITION.nearParallaxPx / ZONE_TRANSITION.parallaxPx;
      const droneX = (droneLook.x - 0.5) * ZONE_TRANSITION.droneMovePx;
      const droneY = (droneLook.y - 0.5) * (ZONE_TRANSITION.droneMovePx * 0.46);
      const droneScale = 1 + (droneLook.y - 0.5) * ZONE_TRANSITION.droneScaleRange;
      document.documentElement.style.setProperty("--room-drift-x", `${driftX.toFixed(2)}px`);
      document.documentElement.style.setProperty("--room-drift-y", `${driftY.toFixed(2)}px`);
      document.documentElement.style.setProperty("--near-drift-x", `${(driftX * nearScale).toFixed(2)}px`);
      document.documentElement.style.setProperty("--near-drift-y", `${(driftY * nearScale).toFixed(2)}px`);
      document.documentElement.style.setProperty("--drone-x", `${droneX.toFixed(2)}px`);
      document.documentElement.style.setProperty("--drone-y", `${droneY.toFixed(2)}px`);
      document.documentElement.style.setProperty("--drone-scale", droneScale.toFixed(3));
      document.documentElement.dataset.droneLook = `${droneLook.x.toFixed(3)},${droneLook.y.toFixed(3)}`;
      updatePresence();
    }

    function setDroneLookToHotspot(index, source = "focus") {
      const hotspot = HOTSPOTS[(index + HOTSPOTS.length) % HOTSPOTS.length];
      const point = hotspotPoint(hotspot);
      setDroneLook(point.x, point.y, source);
    }

    function updatePresence() {
      const buttons = getHotspotButtons();
      let nearest = null;
      let nearestDistance = Infinity;
      HOTSPOTS.forEach((hotspot, index) => {
        const distance = distance2d(droneLook, hotspotPoint(hotspot));
        if (distance < nearestDistance) {
          nearest = { hotspot, index, distance };
          nearestDistance = distance;
        }
      });

      const nearThreshold = 0.145;
      droneLook.nearestHotspotId = nearest && nearest.distance < nearThreshold ? nearest.hotspot.id : "";
      buttons.forEach((button, index) => {
        const isNear = Boolean(nearest && nearest.index === index && nearest.distance < nearThreshold);
        button.classList.toggle("is-near", isNear);
      });
      document.documentElement.dataset.nearestHotspot = droneLook.nearestHotspotId;

      const child = childPoint();
      const childDx = clamp((droneLook.x - child.x) * 42, -7, 7);
      const childDy = clamp((droneLook.y - child.y) * 34, -4, 5);
      document.documentElement.style.setProperty("--child-gaze-x", `${childDx.toFixed(2)}px`);
      document.documentElement.style.setProperty("--child-gaze-y", `${childDy.toFixed(2)}px`);
      document.documentElement.dataset.childGaze = `${childDx.toFixed(2)},${childDy.toFixed(2)}`;

      const childDistance = distance2d(droneLook, child);
      const focusedHotspot = HOTSPOTS[focusedIndex];
      const isChildFocused = focusedHotspot?.id === "child" || droneLook.nearestHotspotId === "child";
      const isAware = childDistance < 0.18 || isChildFocused;
      childActor.classList.toggle("is-aware", isAware);
      document.documentElement.dataset.childAware = String(isAware);

      const now = performance.now();
      if (isAware && now - lastReactiveLineAt > 9000) {
        lastReactiveLineAt = now;
        const line = CHILD_REACTIVE_LINES[Math.floor(Math.random() * CHILD_REACTIVE_LINES.length)];
        showChildLine(line, 2600);
      }
    }

    function startRoomLifeLoop() {
      if (roomLifeFrameId) return;
      const tick = (time) => {
        const idleDriftX = Math.sin(time * 0.00022) * 0.008;
        const idleDriftY = Math.cos(time * 0.00018) * 0.006;
        if (performance.now() - droneLook.lastMovedAt > 2400) {
          setDroneLook(0.5 + idleDriftX, 0.5 + idleDriftY, "idle-drift");
        } else {
          updatePresence();
        }
        roomLifeFrameId = requestAnimationFrame(tick);
      };
      roomLifeFrameId = requestAnimationFrame(tick);
    }

    // MOUSE: each object is a real button, so hover/click and accessibility
    // focus use the same hotspot definitions.
    function createHotspotButton(hotspot, index) {
      const button = document.createElement("button");
      button.type = "button";
      button.className = "hotspot";
      button.dataset.hotspotId = hotspot.id;
      button.dataset.handler = hotspot.handler;
      button.dataset.label = hotspot.label;
      button.style.left = `${hotspot.x}%`;
      button.style.top = `${hotspot.y}%`;
      button.style.width = `clamp(44px, ${hotspot.w}vmin, ${hotspot.w * 7}px)`;
      button.style.height = `clamp(44px, ${hotspot.h}vmin, ${hotspot.h * 7}px)`;
      button.setAttribute("aria-label", hotspot.label);

      button.addEventListener("pointerdown", () => setFocusedHotspot(index, false));
      button.addEventListener("focus", () => setFocusedHotspot(index, false));
      button.addEventListener("click", () => activateHotspot(index));
      return button;
    }

    function renderHotspots() {
      hotspotLayer.innerHTML = "";
      HOTSPOTS.forEach((hotspot, index) => {
        hotspotLayer.append(createHotspotButton(hotspot, index));
      });
      setFocusedHotspot(0, false);
      document.documentElement.dataset.hotspotCount = String(HOTSPOTS.length);
    }

    function getHotspotButtons() {
      return Array.from(hotspotLayer.querySelectorAll(".hotspot"));
    }

    function setFocusedHotspot(index, shouldFocus = true) {
      focusedIndex = (index + HOTSPOTS.length) % HOTSPOTS.length;
      getHotspotButtons().forEach((button, buttonIndex) => {
        button.classList.toggle("is-focused", buttonIndex === focusedIndex);
        button.tabIndex = buttonIndex === focusedIndex ? 0 : -1;
      });
      if (shouldFocus) {
        getHotspotButtons()[focusedIndex]?.focus();
      }
      setDroneLookToHotspot(focusedIndex, shouldFocus ? "keyboard-focus" : "focus");
      document.documentElement.dataset.focusedHotspot = HOTSPOTS[focusedIndex]?.id || "";
    }

    function activateHotspot(index = focusedIndex) {
      const hotspot = HOTSPOTS[(index + HOTSPOTS.length) % HOTSPOTS.length];
      window.SHELTER_HANDLERS[hotspot.handler]();
    }

    // STEP 1 HANDLER STUB: later steps replace these empty panels with real
    // repair, expedition, records, sleep, dialogue, window, and plant screens.
    function openStubPanel(title, extraHtml = "") {
      activePanel = title;
      panelTitle.textContent = `${title} — (not built)`;
      panelBody.className = "panel-body";
      panelBody.innerHTML = extraHtml || "<div>STEP 1 shell stub.</div>";
      modal.classList.add("is-open");
      modal.setAttribute("aria-hidden", "false");
      closePanelButton.focus();
      document.documentElement.dataset.activeShelterPanel = title;
      console.log("shelter panel:", title);
    }

    function closePanel() {
      activePanel = null;
      modal.classList.remove("is-open");
      modal.setAttribute("aria-hidden", "true");
      document.documentElement.dataset.activeShelterPanel = "";
      if (currentZoneId === "living") {
        setFocusedHotspot(focusedIndex, true);
      } else {
        updateZoneUi();
      }
    }

    function openRepair() {
      renderPartWorkshopPanel();
    }

    function enterStageFromShelter() {
      const departing = saveGame({
        ...saveState,
        stage: Math.max(1, Math.floor(Number(saveState.stage) || 1)),
        entryIntent: "continue",
        lastShelterExitAt: Date.now()
      });
      document.documentElement.dataset.shelterDeparting = "true";
      console.log("shelter depart:", departing);
      window.location.href = createStageEntryUrl(departing);
    }

    function departToCity() {
      openStubPanel("DEPART", `
        <div>Drone cradle link is ready.</div>
        <div class="panel-actions">
          <button class="panel-action-button" type="button" data-action="depart-stage">탐사 시작</button>
        </div>
      `);
      const departButton = panelBody.querySelector("[data-action='depart-stage']");
      departButton?.addEventListener("click", enterStageFromShelter);
      departButton?.focus();
    }

    function openWorkshopZone() {
      openStubPanel("WORKSHOP", `
        <div>Workbench and drone cradle are both reachable from this zone.</div>
        <div class="panel-actions">
          <button class="panel-action-button" type="button" data-action="open-repair">REPAIR</button>
          <button class="panel-action-button" type="button" data-action="depart-stage">DEPART</button>
        </div>
      `);
      panelBody.querySelector("[data-action='open-repair']")?.addEventListener("click", openRepair);
      panelBody.querySelector("[data-action='depart-stage']")?.addEventListener("click", enterStageFromShelter);
      panelBody.querySelector("[data-action='open-repair']")?.focus();
    }

    function openRecords() {
      openStubPanel("RECORDS", `
        <div class="panel-record-meta">CYCLE ${saveState.cycle} / DAY ${saveState.day}</div>
        <div>Found records, lore, and city map will live here.</div>
      `);
    }

    function sleepSave() {
      openStubPanel("SLEEP");
    }

    function talkToChild() {
      startShelterDialogue();
    }

    function lookOutside() {
      openStubPanel("WINDOW");
    }

    function drawWater() {
      openStubPanel("WATER");
    }

    function tendPlants() {
      openStubPanel("PLANTS");
    }

    window.SHELTER_HANDLERS = {
      openRepair,
      departToCity,
      openWorkshopZone,
      enterStageFromShelter,
      openRecords,
      sleepSave,
      talkToChild,
      lookOutside,
      drawWater,
      tendPlants
    };
    document.documentElement.dataset.shelterHandlers = Object.keys(window.SHELTER_HANDLERS).join(",");

    // KEYBOARD/GAMEPAD-FRIENDLY INPUT: WASD/arrows move between shelter zones.
    // Tab still cycles diegetic objects inside living; E/Enter/Space activates
    // the focused object or the current zone prompt.
    document.addEventListener("keydown", (event) => {
      shelterAudio.ensureStarted();
      if (shelterDialogueState.active) {
        if (handleShelterDialogueKey(event)) {
          event.preventDefault();
        }
        return;
      }
      if (zoneLayoutEditMode) {
        if (event.key === "Escape") {
          event.preventDefault();
          setZoneLayoutEditMode(false);
        }
        return;
      }
      if (activePanel) {
        if (event.key === "Escape") {
          event.preventDefault();
          closePanel();
        }
        return;
      }

      if (moveZoneForKey(event.key)) {
        event.preventDefault();
        return;
      }

      if (event.key === "Tab" && currentZoneId === "living") {
        event.preventDefault();
        setFocusedHotspot(focusedIndex + (event.shiftKey ? -1 : 1));
        return;
      }

      if ((event.key === "e" || event.key === "E") && currentZoneId !== "living") {
        event.preventDefault();
        activateCurrentZone();
        return;
      }

      if (event.key === "Enter" || event.key === " ") {
        event.preventDefault();
        activateCurrentZone();
      }
    });

    closePanelButton.addEventListener("click", closePanel);
    modal.addEventListener("click", (event) => {
      if (event.target === modal) closePanel();
    });

    scene.addEventListener("pointermove", (event) => {
      const rect = scene.getBoundingClientRect();
      if (!rect.width || !rect.height) return;
      setDroneLook(
        (event.clientX - rect.left) / rect.width,
        (event.clientY - rect.top) / rect.height,
        "pointer"
      );
    });

    scene.addEventListener("pointerdown", () => {
      shelterAudio.ensureStarted();
    });

    shelterAudioToggle.addEventListener("click", (event) => {
      event.stopPropagation();
      shelterAudio.toggle();
    });

    window.addEventListener("resize", () => {
      document.documentElement.dataset.viewport = `${window.innerWidth}x${window.innerHeight}`;
    });

    resetMetaFromUrl();
    setupShelterBackground();
    applyArrivalFade();
    syncSaveDrivenVisuals();
    applyZoneLayout(readSavedZoneLayout());
    createDustMotes();
    startChildLifeLoop();
    renderHotspots();
    renderZoneMinimap();
    setActiveZoneSurface(ZONES.living);
    updateZoneUi();
    queueShelterAutoDialogue();
    startRoomLifeLoop();
    document.documentElement.dataset.shelterReady = "true";
    document.documentElement.dataset.assetFallback = "loading:shelter_bg.png";
    document.documentElement.dataset.viewport = `${window.innerWidth}x${window.innerHeight}`;
  </script>
</body>
</html>
