<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>윤회 무명 — Shelter</title>
  <link rel="icon" href="data:,">
  <style>
    :root {
      color-scheme: dark;
      --ink: #ece9df;
      --ink-dim: rgba(236, 233, 223, 0.58);
      --ink-faint: rgba(236, 233, 223, 0.24);
      --warm: #e8b66b;
      --green: #8fae7a;
      --panel-bg: rgba(16, 14, 12, 0.84);
      --panel-line: rgba(236, 233, 223, 0.18);
      --sanity-light: 1;
      --room-drift-x: 0px;
      --room-drift-y: 0px;
      --near-drift-x: 0px;
      --near-drift-y: 0px;
      --zone-bg-opacity: 1;
      --zone-bg-scale: 1;
      --zone-transition-opacity: 0;
      --zone-transition-scale: 1.08;
      --drone-x: 0px;
      --drone-y: 0px;
      --drone-scale: 1;
      --child-x: 53%;
      --child-y: 47%;
      --child-gaze-x: 0px;
      --child-gaze-y: 0px;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #090807;
      font-family: Consolas, "D2Coding", "Cascadia Mono", monospace;
    }

    .shelter-shell {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 70% 24%, rgba(232, 182, 107, calc(0.12 * var(--sanity-light))), transparent 34%),
        linear-gradient(180deg, #11110f 0%, #080807 100%);
      color: var(--ink);
    }

    .shelter-shell::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 30;
      pointer-events: none;
      opacity: 0;
      background:
        radial-gradient(circle at 45% 48%, rgba(248, 228, 176, 0.1), transparent 34%),
        radial-gradient(circle at 50% 50%, transparent 0 52%, rgba(0, 0, 0, 0.24) 78%, rgba(0, 0, 0, 0.56) 100%);
      transition: opacity 900ms ease;
    }

    body.is-arriving .shelter-shell::after {
      opacity: 1;
    }

    .scene {
      position: relative;
      width: 100vw;
      height: 100vh;
      width: 100dvw;
      height: 100dvh;
      overflow: hidden;
      background: #11100e;
      isolation: isolate;
      cursor: crosshair;
    }

    .scene::before,
    .scene::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .scene::before {
      z-index: 6;
      background:
        radial-gradient(circle at 50% 47%, transparent 0 48%, rgba(18, 15, 12, 0.18) 70%, rgba(4, 3, 3, 0.5) 100%),
        linear-gradient(90deg, rgba(0, 0, 0, 0.18), transparent 16%, transparent 84%, rgba(0, 0, 0, 0.2));
      mix-blend-mode: multiply;
    }

    .scene::after {
      z-index: 6;
      background:
        radial-gradient(ellipse at 50% 47%, transparent 0 58%, rgba(180, 218, 198, 0.035) 76%, rgba(0, 0, 0, 0.16) 100%);
      backdrop-filter: blur(0.7px);
      mask-image: radial-gradient(circle at 50% 47%, transparent 0 55%, #000 76%);
    }

    .bg-layer {
      position: absolute;
      inset: 0;
      overflow: hidden;
      transform: translate3d(var(--room-drift-x), var(--room-drift-y), 0) scale(1.018);
      transition: transform 520ms ease-out;
      background:
        linear-gradient(180deg, rgba(43, 41, 35, 0.78) 0%, rgba(22, 20, 17, 0.92) 100%),
        radial-gradient(circle at 76% 30%, rgba(232, 182, 107, 0.22), transparent 28%),
        radial-gradient(circle at 22% 68%, rgba(107, 139, 100, 0.18), transparent 26%);
    }

    .shelter-bg-image {
      position: absolute;
      inset: 0;
      z-index: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      opacity: var(--zone-bg-opacity);
      transform: scale(var(--zone-bg-scale));
      transition: opacity 120ms linear, transform 120ms ease-out;
      user-select: none;
      -webkit-user-drag: none;
    }

    .zone-placeholder,
    .zone-transition-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .zone-placeholder {
      z-index: 0;
      display: grid;
      place-items: center;
      opacity: 0;
      transition: opacity 160ms linear, transform 160ms ease-out;
      transform: scale(var(--zone-bg-scale));
      background:
        linear-gradient(120deg, rgba(232, 182, 107, 0.08), transparent 42%),
        radial-gradient(circle at 50% 42%, rgba(143, 174, 122, 0.14), transparent 34%),
        repeating-linear-gradient(90deg, rgba(236, 233, 223, 0.035) 0 1px, transparent 1px 72px),
        repeating-linear-gradient(0deg, rgba(236, 233, 223, 0.03) 0 1px, transparent 1px 72px),
        linear-gradient(180deg, #191a15 0%, #0f0e0c 100%);
    }

    .zone-placeholder.is-active {
      opacity: var(--zone-bg-opacity);
    }

    .zone-placeholder-card {
      display: grid;
      gap: 12px;
      place-items: center;
      width: min(520px, calc(100vw - 48px));
      padding: 32px 24px;
      border: 1px solid rgba(236, 233, 223, 0.14);
      background: rgba(10, 9, 8, 0.36);
      color: rgba(236, 233, 223, 0.62);
      text-align: center;
      box-shadow: inset 0 0 80px rgba(0, 0, 0, 0.18);
    }

    .zone-placeholder-title {
      font-size: clamp(20px, 3.2vw, 42px);
      color: rgba(236, 233, 223, 0.78);
      letter-spacing: 0;
    }

    .zone-placeholder-subtitle {
      font-size: 12px;
      color: rgba(236, 233, 223, 0.42);
    }

    .zone-transition-layer {
      z-index: 2;
      opacity: var(--zone-transition-opacity);
      transform: scale(var(--zone-transition-scale));
      transform-origin: center center;
      transition: none;
    }

    .zone-transition-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      opacity: 0;
      user-select: none;
      -webkit-user-drag: none;
    }

    .zone-transition-layer.has-image .zone-transition-image {
      opacity: 1;
    }

    .zone-transition-placeholder {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      opacity: 0;
      background:
        linear-gradient(120deg, rgba(232, 182, 107, 0.1), transparent 44%),
        radial-gradient(circle at 50% 42%, rgba(143, 174, 122, 0.14), transparent 34%),
        repeating-linear-gradient(90deg, rgba(236, 233, 223, 0.035) 0 1px, transparent 1px 72px),
        repeating-linear-gradient(0deg, rgba(236, 233, 223, 0.03) 0 1px, transparent 1px 72px),
        linear-gradient(180deg, #191a15 0%, #0f0e0c 100%);
    }

    .zone-transition-layer.has-placeholder .zone-transition-placeholder {
      opacity: 1;
    }

    .room-sketch {
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      opacity: 0.68;
    }

    .room-sketch::after {
      content: "";
      position: absolute;
      left: 34%;
      top: -8%;
      width: 34%;
      height: 88%;
      pointer-events: none;
      background: linear-gradient(104deg, rgba(248, 238, 220, 0.22), rgba(184, 237, 225, 0.08) 42%, transparent 70%);
      mix-blend-mode: screen;
      opacity: 0.2;
      filter: blur(10px);
      transform-origin: top center;
      animation: lightShaft 12s ease-in-out infinite alternate;
    }

    .window-glow {
      position: absolute;
      left: 30%;
      top: 13%;
      width: 42%;
      height: 52%;
      border: 0;
      background: transparent;
      box-shadow: 0 0 80px rgba(184, 237, 225, calc(0.12 * var(--sanity-light)));
      overflow: hidden;
    }

    .water-shimmer {
      position: absolute;
      inset: 58% -10% 2%;
      background:
        repeating-linear-gradient(0deg, rgba(236, 247, 245, 0.2) 0 1px, transparent 1px 11px),
        linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.18), transparent);
      opacity: 0.18;
      transform: skewX(-9deg);
      animation: waterShimmer 8.6s ease-in-out infinite alternate;
    }

    .floor {
      display: none;
    }

    .soft-dust {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 18% 30%, rgba(143, 174, 122, 0.08), transparent 18%),
        radial-gradient(circle at 50% 72%, rgba(232, 182, 107, 0.07), transparent 28%),
        radial-gradient(circle at 75% 65%, rgba(236, 233, 223, 0.04), transparent 24%);
      mix-blend-mode: screen;
    }

    .room-life {
      position: absolute;
      inset: 0;
      z-index: 4;
      pointer-events: none;
      transform: translate3d(var(--near-drift-x), var(--near-drift-y), 0);
      transition: transform 520ms ease-out, opacity 420ms ease;
    }

    .room-life.is-zone-muted {
      opacity: 0;
    }

    .hanging-bulb {
      position: absolute;
      left: 48%;
      top: 5%;
      width: 1px;
      height: 21%;
      transform-origin: top center;
      background: rgba(236, 233, 223, 0.22);
      animation: bulbSway 7.8s ease-in-out infinite;
    }

    .hanging-bulb::after {
      content: "";
      position: absolute;
      left: -8px;
      bottom: -12px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: rgba(248, 228, 176, 0.52);
      box-shadow: 0 0 34px rgba(232, 182, 107, 0.32), 0 0 90px rgba(232, 182, 107, 0.16);
      animation: bulbFlicker 5.4s linear infinite;
    }

    .laundry-line {
      position: absolute;
      left: 61%;
      top: 19%;
      width: 19%;
      height: 1px;
      background: rgba(236, 233, 223, 0.16);
      transform: rotate(7deg);
    }

    .laundry-line span {
      position: absolute;
      top: 2px;
      width: 24px;
      height: 34px;
      border-radius: 2px 2px 7px 7px;
      background: rgba(236, 233, 223, 0.12);
      transform-origin: top center;
      animation: laundryDrift 9s ease-in-out infinite;
    }

    .laundry-line span:nth-child(1) {
      left: 16%;
      animation-delay: -1.8s;
    }

    .laundry-line span:nth-child(2) {
      left: 42%;
      height: 42px;
      animation-delay: -4.1s;
    }

    .laundry-line span:nth-child(3) {
      left: 68%;
      animation-delay: -6.3s;
    }

    .plant-life {
      position: absolute;
      left: 54%;
      top: 48%;
      width: 82px;
      height: 80px;
    }

    .plant-life::before {
      content: "";
      position: absolute;
      left: 22px;
      bottom: 0;
      width: 38px;
      height: 19px;
      border-radius: 0 0 12px 12px;
      background: rgba(70, 52, 36, 0.42);
    }

    .plant-life span {
      position: absolute;
      left: 38px;
      bottom: 16px;
      width: 9px;
      height: 42px;
      border-radius: 50% 50% 0 50%;
      background: rgba(143, 174, 122, 0.32);
      transform-origin: bottom center;
      animation: leafMove 6.8s ease-in-out infinite;
    }

    .plant-life span:nth-child(1) {
      transform: rotate(-34deg);
      animation-delay: -1.4s;
    }

    .plant-life span:nth-child(2) {
      height: 54px;
      transform: rotate(-9deg);
      animation-delay: -3.7s;
    }

    .plant-life span:nth-child(3) {
      transform: rotate(24deg);
      animation-delay: -5.2s;
    }

    .record-terminal-glow {
      position: absolute;
      left: 77.5%;
      top: 42%;
      width: 4.8%;
      height: 8.4%;
      border-radius: 2px;
      background: rgba(183, 226, 208, 0.12);
      box-shadow: 0 0 18px rgba(183, 226, 208, 0.18);
      animation: terminalFlicker 4.2s steps(4, end) infinite;
    }

    .dust-mote {
      position: absolute;
      width: 2px;
      height: 2px;
      border-radius: 50%;
      background: rgba(248, 238, 220, 0.42);
      box-shadow: 0 0 7px rgba(248, 238, 220, 0.3);
      opacity: 0.32;
      animation: dustFloat var(--dust-dur, 12s) linear infinite;
      animation-delay: var(--dust-delay, 0s);
    }

    .child-actor {
      position: absolute;
      left: var(--child-x);
      top: var(--child-y);
      z-index: 6;
      width: 44px;
      height: 96px;
      transform: translate(-50%, -100%);
      transition: left 3200ms cubic-bezier(0.22, 0.7, 0.22, 1), top 3200ms cubic-bezier(0.22, 0.7, 0.22, 1), filter 360ms ease;
      filter: drop-shadow(0 18px 22px rgba(0, 0, 0, 0.34));
    }

    .child-actor.is-aware {
      filter: drop-shadow(0 18px 22px rgba(0, 0, 0, 0.34)) drop-shadow(0 0 18px rgba(248, 228, 176, 0.16));
    }

    .child-head {
      position: absolute;
      left: 50%;
      top: 7px;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: rgba(238, 240, 235, 0.84);
      transform: translateX(-50%) translate(var(--child-gaze-x), var(--child-gaze-y));
      transition: transform 420ms ease;
    }

    .child-head::after {
      content: "";
      position: absolute;
      left: 5px;
      top: 10px;
      width: 14px;
      height: 4px;
      border-radius: 999px;
      background: rgba(20, 18, 17, 0.32);
      opacity: 0.7;
    }

    .child-body {
      position: absolute;
      left: 50%;
      top: 32px;
      width: 23px;
      height: 44px;
      border-radius: 10px 10px 6px 6px;
      background: rgba(24, 22, 21, 0.58);
      transform: translateX(-50%);
      animation: childBreath 3.8s ease-in-out infinite;
    }

    .child-arm {
      position: absolute;
      top: 40px;
      width: 7px;
      height: 34px;
      border-radius: 999px;
      background: rgba(35, 31, 29, 0.5);
      transform-origin: top center;
      animation: childHands 5.6s ease-in-out infinite;
    }

    .child-arm.left {
      left: 8px;
    }

    .child-arm.right {
      right: 8px;
      animation-delay: -2.8s;
    }

    .child-ambient-line {
      position: absolute;
      left: 50%;
      top: -12px;
      min-width: 150px;
      transform: translate(-50%, -100%);
      padding: 7px 10px;
      border: 1px solid rgba(248, 228, 176, 0.16);
      background: rgba(10, 8, 7, 0.52);
      color: rgba(248, 238, 220, 0.78);
      font: 13px/1.25 "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
      text-align: center;
      opacity: 0;
      transition: opacity 620ms ease, transform 620ms ease;
    }

    .child-ambient-line.is-visible {
      opacity: 1;
      transform: translate(-50%, -118%);
    }

    .drone-reticle {
      position: absolute;
      left: 50%;
      top: 50%;
      z-index: 9;
      width: 42px;
      height: 42px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      pointer-events: none;
      opacity: 0.24;
      transition: opacity 300ms ease;
    }

    .drone-reticle::before,
    .drone-reticle::after {
      content: "";
      position: absolute;
      inset: 50% auto auto 50%;
      width: 26px;
      height: 1px;
      transform: translate(-50%, -50%);
      background: rgba(236, 233, 223, 0.28);
    }

    .drone-reticle::after {
      width: 1px;
      height: 26px;
    }

    .drone-vignette {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 48%, transparent 0 58%, rgba(0, 0, 0, 0.26) 82%, rgba(0, 0, 0, 0.64) 100%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.035), transparent 16%, transparent 84%, rgba(0, 0, 0, 0.14));
      z-index: 5;
    }

    .hud {
      position: absolute;
      left: clamp(18px, 3vw, 38px);
      top: clamp(18px, 3vw, 34px);
      display: flex;
      gap: 16px;
      align-items: center;
      z-index: 8;
      color: rgba(236, 233, 223, 0.64);
      font-size: 12px;
      text-shadow: 0 0 12px rgba(0, 0, 0, 0.5);
      transition: opacity 900ms ease;
    }

    .hud span {
      color: rgba(236, 233, 223, 0.38);
    }

    .sanity-aura {
      position: absolute;
      left: 53%;
      top: 42%;
      width: 13vmin;
      height: 13vmin;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(232, 182, 107, calc(0.18 * var(--sanity-light))), transparent 68%);
      pointer-events: none;
      z-index: 2;
    }

    #hotspotLayer {
      position: absolute;
      inset: 0;
      z-index: 7;
      transition: opacity 900ms ease;
      transform: translate3d(var(--near-drift-x), var(--near-drift-y), 0);
    }

    body.is-arriving .hud,
    body.is-arriving .zone-minimap,
    body.is-arriving .zone-prompt,
    body.is-arriving #hotspotLayer {
      opacity: 0;
      pointer-events: none;
    }

    .hotspot {
      position: absolute;
      z-index: 7;
      border: 1px solid transparent;
      border-radius: 50%;
      background: rgba(232, 182, 107, 0);
      box-shadow: none;
      cursor: pointer;
      transform: translate(-50%, -50%);
      transition: border-color 420ms ease, background 420ms ease, box-shadow 420ms ease, transform 420ms ease;
    }

    .hotspot::before {
      content: "";
      position: absolute;
      inset: 18%;
      border-radius: 50%;
      border: 1px solid rgba(236, 233, 223, 0.08);
    }

    .hotspot::after {
      content: attr(data-label);
      position: absolute;
      left: 50%;
      top: -12px;
      transform: translate(-50%, -100%);
      padding: 5px 8px;
      border: 1px solid rgba(236, 233, 223, 0.16);
      background: rgba(13, 12, 10, 0.76);
      color: rgba(236, 233, 223, 0.78);
      font: 12px/1.2 Consolas, "D2Coding", monospace;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 520ms ease 260ms, transform 520ms ease 260ms;
    }

    .hotspot.is-near,
    .hotspot.is-focused,
    .hotspot:focus-visible {
      border-color: rgba(232, 182, 107, 0.46);
      background: rgba(232, 182, 107, 0.08);
      box-shadow: 0 0 30px rgba(232, 182, 107, 0.24), inset 0 0 28px rgba(232, 182, 107, 0.08);
      transform: translate(-50%, -50%) scale(1.035);
      outline: none;
    }

    .hotspot.is-near::after,
    .hotspot.is-focused::after,
    .hotspot:focus-visible::after {
      opacity: 1;
      transform: translate(-50%, -108%);
    }

    .hotspot.is-zone-hidden {
      opacity: 0;
      pointer-events: none;
    }

    .zone-minimap {
      position: absolute;
      left: clamp(18px, 3vw, 38px);
      bottom: clamp(18px, 3vw, 34px);
      z-index: 12;
      width: clamp(168px, 16vw, 218px);
      aspect-ratio: 1.32;
      padding: 8px;
      border: 1px solid rgba(236, 233, 223, 0.12);
      background: rgba(8, 7, 6, 0.34);
      transition: opacity 420ms ease;
    }

    .zone-map-cell {
      position: absolute;
      appearance: none;
      padding: 0;
      border: 1px solid rgba(236, 233, 223, 0.14);
      background: rgba(236, 233, 223, 0.04);
      opacity: 0.32;
      cursor: default;
      transition: opacity 240ms ease, border-color 240ms ease, background 240ms ease, box-shadow 240ms ease;
    }

    .zone-map-cell.is-room {
      opacity: 0.62;
    }

    .zone-map-cell.is-adjacent {
      border-color: rgba(143, 174, 122, 0.54);
      background: rgba(143, 174, 122, 0.1);
      opacity: 0.84;
      cursor: pointer;
    }

    .zone-map-cell.is-current {
      border-color: rgba(232, 182, 107, 0.68);
      background: rgba(232, 182, 107, 0.22);
      box-shadow: 0 0 18px rgba(232, 182, 107, 0.24);
      opacity: 1;
    }

    .zone-map-cell::after {
      content: attr(data-short);
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: rgba(236, 233, 223, 0.48);
      font: 8px/1 Consolas, "D2Coding", monospace;
      pointer-events: none;
    }

    .zone-map-cell.is-current::after {
      color: rgba(248, 228, 176, 0.86);
    }

    .zone-prompt {
      position: absolute;
      left: 50%;
      bottom: clamp(20px, 4vh, 48px);
      z-index: 12;
      min-width: 180px;
      transform: translateX(-50%);
      padding: 8px 12px;
      border: 1px solid rgba(236, 233, 223, 0.12);
      background: rgba(8, 7, 6, 0.38);
      color: rgba(236, 233, 223, 0.58);
      font: 12px/1.2 Consolas, "D2Coding", monospace;
      text-align: center;
      opacity: 0;
      transition: opacity 420ms ease, transform 420ms ease;
      pointer-events: none;
    }

    .zone-prompt.is-visible {
      opacity: 1;
      transform: translateX(-50%) translateY(-4px);
    }

    .drone-body {
      position: absolute;
      left: 50%;
      bottom: 8.5%;
      z-index: 8;
      width: 54px;
      height: 18px;
      border-radius: 50%;
      background: radial-gradient(ellipse at 50% 44%, rgba(236, 233, 223, 0.22), rgba(236, 233, 223, 0.05) 58%, transparent 76%);
      box-shadow: 0 10px 26px rgba(0, 0, 0, 0.24);
      opacity: 0.34;
      transform: translate3d(calc(-50% + var(--drone-x)), var(--drone-y), 0) scale(var(--drone-scale));
      transition: transform 520ms ease-out, opacity 420ms ease;
      pointer-events: none;
    }

    body.is-arriving .drone-body {
      opacity: 0;
    }

    .shelter-audio-toggle {
      position: fixed;
      right: clamp(18px, 3vw, 38px);
      top: clamp(18px, 3vw, 34px);
      z-index: 12;
      border: 0;
      background: transparent;
      color: rgba(236, 233, 223, 0.44);
      cursor: pointer;
      font: 12px/1 Consolas, "D2Coding", monospace;
      padding: 5px 0;
      text-shadow: 0 0 12px rgba(0, 0, 0, 0.45);
    }

    .shelter-audio-toggle:hover,
    .shelter-audio-toggle:focus-visible {
      color: rgba(236, 233, 223, 0.78);
      outline: none;
    }

    @keyframes waterShimmer {
      from {
        transform: translateX(-8%) skewX(-9deg);
        opacity: 0.24;
      }

      to {
        transform: translateX(8%) skewX(-9deg);
        opacity: 0.4;
      }
    }

    @keyframes bulbSway {
      0%, 100% {

        transform: rotate(1.4deg);
      }
    }

      0%, 100% {
        opacity: 0.88;
      }

      47% {
        opacity: 0.74;
      }

      49% {
        opacity: 0.94;
      }

      72% {
        opacity: 0.8;
      }
    }

    @keyframes laundryDrift {
      0%, 100% {
        transform: rotate(-2deg);
      }

      50% {
        transform: rotate(2.8deg);
      }
    }

    @keyframes leafMove {
      0%, 100% {
        margin-left: 0;
      }

      50% {
        margin-left: 3px;
      }
    }

    @keyframes terminalFlicker {
      0%, 100% {
        opacity: 0.38;
      }

      12% {
        opacity: 0.12;
      }

      18% {
        opacity: 0.5;
      }

      64% {
        opacity: 0.22;
      }
    }

    @keyframes lightShaft {
      from {
        opacity: 0.14;
        transform: translateX(-10px) rotate(2deg);
      }

      to {
        opacity: 0.24;
        transform: translateX(10px) rotate(-1deg);
      }
    }

    @keyframes dustFloat {
      from {
        transform: translate3d(0, 12px, 0);
      }

      to {
        transform: translate3d(28px, -86px, 0);
      }
    }

    @keyframes childBreath {
      0%, 100% {
        transform: translateX(-50%) scaleY(1);
      }

      50% {
        transform: translateX(-50%) scaleY(1.035);
      }
    }

      0%, 100% {
        transform: rotate(4deg);
      }

      50% {
        transform: rotate(-8deg);
      }
    }

    .modal {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      z-index: 20;
      background: rgba(6, 5, 4, 0.45);
      opacity: 0;
      pointer-events: none;

    }

    .modal.is-open {
      opacity: 1;
      pointer-events: auto;
    }

    .panel {
      min-width: min(420px, calc(100vw - 38px));

      return a + (b - a) * clamp(t, 0, 1);
    }

    function distance2d(a, b) {
      return Math.hypot(a.x - b.x, a.y - b.y);
    }

      return n < 0.5 ? 4 * n * n * n : 1 - Math.pow(-2 * n + 2, 3) / 2;

    }

    function setZoneTransitionProgress(progress) {
      const t = clamp(progress, 0, 1);
      const activeScale = lerp(1, ZONE_TRANSITION.zoomScale, t);
      const incomingScale = lerp(ZONE_TRANSITION.incomingStartScale, 1, t);
      document.documentElement.style.setProperty("--zone-bg-opacity", (1 - t).toFixed(3));
      document.documentElement.style.setProperty("--zone-bg-scale", activeScale.toFixed(4));
      document.documentElement.style.setProperty("--zone-transition-opacity", t.toFixed(3));
      document.documentElement.style.setProperty("--zone-transition-scale", incomingScale.toFixed(4));
    }

    function resetZoneTransitionSurface() {
      document.documentElement.style.setProperty("--zone-bg-opacity", "1");
      document.documentElement.style.setProperty("--zone-bg-scale", "1");
      document.documentElement.style.setProperty("--zone-transition-opacity", "0");
      document.documentElement.style.setProperty("--zone-transition-scale", String(ZONE_TRANSITION.incomingStartScale));
      zoneTransitionLayer?.classList.remove("has-image", "has-placeholder");
      if (zoneTransitionImage) {
        zoneTransitionImage.onload = null;
        zoneTransitionImage.onerror = null;
        zoneTransitionImage.removeAttribute("src");
      }
    }

    function renderZoneMinimap() {
      if (!zoneMinimap) return;
      zoneMinimap.innerHTML = "";
      Object.values(ZONES).forEach((zone) => {
        const cell = document.createElement("button");
        cell.type = "button";
        cell.className = "zone-map-cell is-room";
        cell.dataset.zoneId = zone.id;
        cell.dataset.short = zone.short || zone.label.slice(0, 3).toUpperCase();
        cell.title = zone.label;
        cell.setAttribute("aria-label", zone.label);
        cell.style.left = `${zone.map.x}%`;
        cell.style.top = `${zone.map.y}%`;
        cell.style.width = `${zone.map.w}%`;
        cell.style.height = `${zone.map.h}%`;
        cell.addEventListener("click", () => {
          if (canMoveToZone(zone.id)) beginZoneTransition(zone.id);
        });
        zoneMinimap.append(cell);
      });
    }

    function updateZoneUi() {
      const zone = zoneById(currentZoneId);
      document.documentElement.dataset.shelterZone = zone.id;
      document.documentElement.dataset.zoneTransitionMs = String(ZONE_TRANSITION.durationMs);
      document.documentElement.dataset.zoneParallaxPx = String(ZONE_TRANSITION.parallaxPx);

      zoneMinimap?.querySelectorAll(".zone-map-cell").forEach((cell) => {
        const zoneId = cell.dataset.zoneId;
        cell.classList.toggle("is-current", zoneId === zone.id);
        cell.classList.toggle("is-adjacent", zone.adjacent.includes(zoneId));
        cell.disabled = zoneId !== zone.id && !zone.adjacent.includes(zoneId);
      });

      const showLivingHotspots = zone.id === "living";
      getHotspotButtons().forEach((button) => {
        button.classList.toggle("is-zone-hidden", !showLivingHotspots);
        button.tabIndex = showLivingHotspots && button.classList.contains("is-focused") ? 0 : -1;
      });
      roomLife?.classList.toggle("is-zone-muted", !showLivingHotspots);

      if (zonePrompt) {
        const prompt = zone.prompt || "";
        zonePrompt.textContent = prompt;
        zonePrompt.classList.toggle("is-visible", Boolean(prompt));
      }
    }

    function zoneCenter(zone) {
      return {
        x: zone.map.x + zone.map.w / 2,
        y: zone.map.y + zone.map.h / 2
      };
    }

    function canMoveToZone(zoneId) {
      if (zoneId === currentZoneId) return false;
      return zoneById(currentZoneId).adjacent.includes(zoneId);
    }

    function directionVectorForKey(key) {
      const keyId = key.length === 1 ? key.toLowerCase() : key.toLowerCase();
      if (keyId === "w" || keyId === "arrowup") return { x: 0, y: -1 };
      if (keyId === "s" || keyId === "arrowdown") return { x: 0, y: 1 };
      if (keyId === "a" || keyId === "arrowleft") return { x: -1, y: 0 };
      if (keyId === "d" || keyId === "arrowright") return { x: 1, y: 0 };
      return null;
    }

    function adjacentZoneTowardKey(key) {
      const direction = directionVectorForKey(key);
      if (!direction) return null;

      const currentZone = zoneById(currentZoneId);
      const currentCenter = zoneCenter(currentZone);
      let best = null;
      for (const adjacentId of currentZone.adjacent) {
        const adjacentZone = zoneById(adjacentId);
        const adjacentCenter = zoneCenter(adjacentZone);
        const dx = adjacentCenter.x - currentCenter.x;
        const dy = adjacentCenter.y - currentCenter.y;
        const distance = Math.hypot(dx, dy) || 1;
        const score = (dx / distance) * direction.x + (dy / distance) * direction.y;
        if (!best || score > best.score) {
          best = { zoneId: adjacentZone.id, score };
        }
      }
      return best && best.score > 0.22 ? best.zoneId : null;
    }

    function finishZoneTransition(nextZoneId) {
      currentZoneId = nextZoneId;
      setActiveZoneSurface(zoneById(currentZoneId));
      resetZoneTransitionSurface();
      zoneTransitionState = null;
      document.documentElement.dataset.shelterZoneTransition = "";
      updateZoneUi();
    }

    function beginZoneTransition(nextZoneId) {
      if (zoneTransitionState || nextZoneId === currentZoneId) return false;
      const fromZone = zoneById(currentZoneId);
      const toZone = zoneById(nextZoneId);
      const startedAt = performance.now();
      zoneTransitionState = { from: fromZone.id, to: toZone.id, startedAt };
      document.documentElement.dataset.shelterZoneTransition = `${fromZone.id}>${toZone.id}`;
      setTransitionZoneSurface(toZone);
      const lookPoint = ZONE_LOOK_POINTS[toZone.id] || ZONE_LOOK_POINTS.living;
      setDroneLook(lookPoint.x, lookPoint.y, "zone-transition");

      const tick = (time) => {
        if (!zoneTransitionState) return;
        const eased = easeInOutCubic((time - startedAt) / ZONE_TRANSITION.durationMs);
        setZoneTransitionProgress(eased);
        if (eased >= 1) {
          finishZoneTransition(toZone.id);
          return;
        }
        zoneTransitionFrameId = requestAnimationFrame(tick);
      };

      cancelAnimationFrame(zoneTransitionFrameId);
      zoneTransitionFrameId = requestAnimationFrame(tick);
      return true;
    }

    function moveZoneForKey(key) {
      const nextZoneId = adjacentZoneTowardKey(key);
      if (!nextZoneId) return false;
      if (zoneTransitionState) return true;
      return beginZoneTransition(nextZoneId);
    }

    function activateCurrentZone() {
      const zone = zoneById(currentZoneId);
      if (zone.id === "living") {
        activateHotspot();
        return true;
      }
      if (!zone.action) return false;
      window.SHELTER_HANDLERS[zone.action]?.();
      return true;
    }

    class ShelterAudio {
      constructor() {
        this.context = null;
        this.master = null;
        this.bgm = shelterBgmAudio;
        this.isMuted = false;
        this.childTimer = 0;
        if (this.bgm) {
          this.bgm.volume = 0.42;
          this.bgm.muted = false;
        }
        document.documentElement.dataset.shelterAudioStarted = "false";
        document.documentElement.dataset.shelterAudioMuted = "false";
        document.documentElement.dataset.shelterBgm = "assets/audio/rain-on-glass.mp3";
      }

      ensureStarted() {
        this.startBgm();

        if (this.context) {
          this.context.resume();
          return;
        }

        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        if (!AudioContextClass) return;

        this.context = new AudioContextClass();
        this.master = this.context.createGain();
        this.master.gain.value = this.isMuted ? 0 : 0.58;
        this.master.connect(this.context.destination);
        document.documentElement.dataset.shelterAudioStarted = "true";

        this.createRainBed();
        this.createWaterBed();
        this.createBulbHum();
        this.scheduleChildMovement();
      }

      startBgm() {
        if (!this.bgm) return;
        this.bgm.muted = this.isMuted;
        this.bgm.volume = this.isMuted ? 0 : 0.42;
        const playPromise = this.bgm.play();
        if (playPromise && typeof playPromise.catch === "function") {
          playPromise
            .then(() => {
              window.__lastShelterBgmPlayError = "";
              document.documentElement.dataset.shelterBgmPlaying = this.isMuted ? "muted" : "true";
            })
            .catch((error) => {
              window.__lastShelterBgmPlayError = error ? `${error.name}: ${error.message}` : "audio play rejected";
              document.documentElement.dataset.shelterBgmPlaying = "blocked";
            });
        }
      }

      createNoiseBuffer(seconds = 2) {
        const sampleRate = this.context.sampleRate;
        const buffer = this.context.createBuffer(1, sampleRate * seconds, sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < data.length; i += 1) {
          data[i] = Math.random() * 2 - 1;
        }
        return buffer;
      }

      createLoopedNoise({ filterType, frequency, gainValue, panValue }) {
        const source = this.context.createBufferSource();
        source.buffer = this.createNoiseBuffer();
        source.loop = true;

        const filter = this.context.createBiquadFilter();
        filter.type = filterType;
        filter.frequency.value = frequency;
        filter.Q.value = 0.6;

        const gain = this.context.createGain();
        gain.gain.value = gainValue;

        const pan = this.context.createStereoPanner ? this.context.createStereoPanner() : null;
        if (pan) pan.pan.value = panValue;

        source.connect(filter);
        filter.connect(gain);
        if (pan) {
          gain.connect(pan);
          pan.connect(this.master);
        } else {
          gain.connect(this.master);
        }
        source.start();
      }

      createRainBed() {
        this.createLoopedNoise({
          filterType: "bandpass",
          frequency: 1180,
          gainValue: 0.026,
          panValue: -0.18
        });
      }

      createWaterBed() {
        this.createLoopedNoise({
          filterType: "lowpass",
          frequency: 420,
          gainValue: 0.032,
          panValue: 0.42
        });
      }

      createBulbHum() {
        const osc = this.context.createOscillator();
        const gain = this.context.createGain();
        const pan = this.context.createStereoPanner ? this.context.createStereoPanner() : null;
        osc.type = "sine";
        osc.frequency.value = 93;
        gain.gain.value = 0.012;
        if (pan) pan.pan.value = -0.08;
        osc.connect(gain);
        if (pan) {
          gain.connect(pan);
          pan.connect(this.master);
        } else {
          gain.connect(this.master);
        }
        osc.start();
      }

      playChildMovement() {
        if (!this.context || this.isMuted) return;
        const now = this.context.currentTime;
        const osc = this.context.createOscillator();
        const gain = this.context.createGain();
        const pan = this.context.createStereoPanner ? this.context.createStereoPanner() : null;
        const point = childPoint();
        osc.type = "triangle";
        osc.frequency.setValueAtTime(220 + Math.random() * 80, now);
        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.exponentialRampToValueAtTime(0.012, now + 0.025);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.16);
        if (pan) pan.pan.value = clamp((point.x - 0.5) * 1.4, -0.75, 0.75);
        osc.connect(gain);
        if (pan) {
          gain.connect(pan);
          pan.connect(this.master);
        } else {
          gain.connect(this.master);
        }
        osc.start(now);
        osc.stop(now + 0.18);
      }

      scheduleChildMovement() {
        window.clearTimeout(this.childTimer);
        this.childTimer = window.setTimeout(() => {
          this.playChildMovement();
          this.scheduleChildMovement();
        }, 6200 + Math.random() * 6800);
      }

      setMuted(nextMuted) {
        this.isMuted = Boolean(nextMuted);
        this.ensureStarted();
        if (this.bgm) {
          this.bgm.muted = this.isMuted;
          this.bgm.volume = this.isMuted ? 0 : 0.42;
          document.documentElement.dataset.shelterBgmPlaying = this.isMuted ? "muted" : "true";
        }
        document.documentElement.dataset.shelterAudioMuted = String(this.isMuted);
        shelterAudioToggle.textContent = this.isMuted ? "소리 꺼짐" : "소리 켜짐";
        if (!this.master || !this.context) return;
        const now = this.context.currentTime;
        this.master.gain.cancelScheduledValues(now);
        this.master.gain.setTargetAtTime(this.isMuted ? 0 : 0.58, now, 0.18);
      }

      toggle() {
        this.setMuted(!this.isMuted);
      }
    }

    const shelterAudio = new ShelterAudio();

    function normalizeSave(state) {
      const sanity = clamp(Math.floor(Number(state?.sanity ?? 100) || 0), 0, 100);
      const deaths = Math.max(0, Math.floor(Number(state?.deaths) || 0));
      const cycle = Math.max(1, Math.floor(Number(state?.cycle ?? state?.day ?? deaths + 1) || 1));
      return {
        ...DEFAULT_SAVE,
        ...state,
        deaths,
        sanity,
        cycle,
        day: Math.max(1, Math.floor(Number(state?.day ?? cycle) || cycle)),
        exists: Boolean(state?.exists)
      };
    }

    function loadSave() {
      try {
        const raw = localStorage.getItem(SAVE_KEY);
        return raw ? JSON.parse(raw) : null;
      } catch {
        return null;
      }
    }

    function saveGame(state) {
      const next = normalizeSave({
        ...DEFAULT_SAVE,
        ...state,
        exists: true
      });
      try {
        localStorage.setItem(SAVE_KEY, JSON.stringify(next));
      } catch (error) {
        console.warn("shelter save failed before expedition", error);
      }
      saveState = next;
      syncSaveDrivenVisuals();
      return next;
    }

    function createStageEntryUrl(state) {

      params.set("directLevel", "1");
      params.set("entry", "shelter");

      return `${GAME_ENTRY_PATH}?${params.toString()}`;
    }

    function setDroneLook(x, y, source = "pointer") {
      droneLook.x = clamp(x, 0.02, 0.98);
      droneLook.y = clamp(y, 0.02, 0.98);
      droneLook.source = source;
      if (source !== "idle-drift") {
        droneLook.lastMovedAt = performance.now();
      }

      const driftX = (0.5 - droneLook.x) * ZONE_TRANSITION.parallaxPx;
      const driftY = (0.5 - droneLook.y) * (ZONE_TRANSITION.parallaxPx * 0.66);
      const nearScale = ZONE_TRANSITION.nearParallaxPx / ZONE_TRANSITION.parallaxPx;
      const droneX = (droneLook.x - 0.5) * ZONE_TRANSITION.droneMovePx;
      const droneY = (droneLook.y - 0.5) * (ZONE_TRANSITION.droneMovePx * 0.46);
      const droneScale = 1 + (droneLook.y - 0.5) * ZONE_TRANSITION.droneScaleRange;
      document.documentElement.style.setProperty("--room-drift-x", `${driftX.toFixed(2)}px`);
      document.documentElement.style.setProperty("--room-drift-y", `${driftY.toFixed(2)}px`);
      document.documentElement.style.setProperty("--near-drift-x", `${(driftX * nearScale).toFixed(2)}px`);
      document.documentElement.style.setProperty("--near-drift-y", `${(driftY * nearScale).toFixed(2)}px`);
      document.documentElement.style.setProperty("--drone-x", `${droneX.toFixed(2)}px`);
      document.documentElement.style.setProperty("--drone-y", `${droneY.toFixed(2)}px`);
      document.documentElement.style.setProperty("--drone-scale", droneScale.toFixed(3));
      document.documentElement.dataset.droneLook = `${droneLook.x.toFixed(3)},${droneLook.y.toFixed(3)}`;
      updatePresence();
    }

    function setDroneLookToHotspot(index, source = "focus") {
      const hotspot = HOTSPOTS[(index + HOTSPOTS.length) % HOTSPOTS.length];
      const point = hotspotPoint(hotspot);
      setDroneLook(point.x, point.y, source);
    }

    function updatePresence() {
      const buttons = getHotspotButtons();
      let nearest = null;
      let nearestDistance = Infinity;
      HOTSPOTS.forEach((hotspot, index) => {
        const distance = distance2d(droneLook, hotspotPoint(hotspot));
        if (distance < nearestDistance) {
          nearest = { hotspot, index, distance };
          nearestDistance = distance;
        }
      });

      const nearThreshold = 0.145;
      droneLook.nearestHotspotId = nearest && nearest.distance < nearThreshold ? nearest.hotspot.id : "";
      buttons.forEach((button, index) => {
        const isNear = Boolean(nearest && nearest.index === index && nearest.distance < nearThreshold);
        button.classList.toggle("is-near", isNear);
      });
      document.documentElement.dataset.nearestHotspot = droneLook.nearestHotspotId;

      const child = childPoint();
      const childDx = clamp((droneLook.x - child.x) * 42, -7, 7);
      const childDy = clamp((droneLook.y - child.y) * 34, -4, 5);
      document.documentElement.style.setProperty("--child-gaze-x", `${childDx.toFixed(2)}px`);
      document.documentElement.style.setProperty("--child-gaze-y", `${childDy.toFixed(2)}px`);
      document.documentElement.dataset.childGaze = `${childDx.toFixed(2)},${childDy.toFixed(2)}`;

      const childDistance = distance2d(droneLook, child);
      const focusedHotspot = HOTSPOTS[focusedIndex];
      const isChildFocused = focusedHotspot?.id === "child" || droneLook.nearestHotspotId === "child";
      const isAware = childDistance < 0.18 || isChildFocused;
      childActor.classList.toggle("is-aware", isAware);
      document.documentElement.dataset.childAware = String(isAware);

      const now = performance.now();
      if (isAware && now - lastReactiveLineAt > 9000) {
        lastReactiveLineAt = now;
        const line = CHILD_REACTIVE_LINES[Math.floor(Math.random() * CHILD_REACTIVE_LINES.length)];
        showChildLine(line, 2600);
      }
    }

    function startRoomLifeLoop() {
      if (roomLifeFrameId) return;
      const tick = (time) => {
        const idleDriftX = Math.sin(time * 0.00022) * 0.008;
        const idleDriftY = Math.cos(time * 0.00018) * 0.006;
        if (performance.now() - droneLook.lastMovedAt > 2400) {
          setDroneLook(0.5 + idleDriftX, 0.5 + idleDriftY, "idle-drift");
        } else {
          updatePresence();
        }
        roomLifeFrameId = requestAnimationFrame(tick);
      };
      roomLifeFrameId = requestAnimationFrame(tick);
    }

    // MOUSE: each object is a real button, so hover/click and accessibility
    // focus use the same hotspot definitions.
    function createHotspotButton(hotspot, index) {
      const button = document.createElement("button");
      button.type = "button";
      button.className = "hotspot";
      button.dataset.hotspotId = hotspot.id;
      button.dataset.handler = hotspot.handler;
      button.dataset.label = hotspot.label;
      button.style.left = `${hotspot.x}%`;
      button.style.top = `${hotspot.y}%`;
      button.style.width = `clamp(44px, ${hotspot.w}vmin, ${hotspot.w * 7}px)`;
      button.style.height = `clamp(44px, ${hotspot.h}vmin, ${hotspot.h * 7}px)`;
      button.setAttribute("aria-label", hotspot.label);

      button.addEventListener("pointerdown", () => setFocusedHotspot(index, false));
      button.addEventListener("focus", () => setFocusedHotspot(index, false));
      button.addEventListener("click", () => activateHotspot(index));
      return button;
    }

    function renderHotspots() {

    }

    function getHotspotButtons() {
      return Array.from(hotspotLayer.querySelectorAll(".hotspot"));
    }

    function setFocusedHotspot(index, shouldFocus = true) {
      focusedIndex = (index + HOTSPOTS.length) % HOTSPOTS.length;
      getHotspotButtons().forEach((button, buttonIndex) => {
        button.classList.toggle("is-focused", buttonIndex === focusedIndex);
        button.tabIndex = buttonIndex === focusedIndex ? 0 : -1;
      });
      if (shouldFocus) {
        getHotspotButtons()[focusedIndex]?.focus();
      }
      setDroneLookToHotspot(focusedIndex, shouldFocus ? "keyboard-focus" : "focus");
      document.documentElement.dataset.focusedHotspot = HOTSPOTS[focusedIndex]?.id || "";
    }

    function activateHotspot(index = focusedIndex) {
      const hotspot = HOTSPOTS[(index + HOTSPOTS.length) % HOTSPOTS.length];
      window.SHELTER_HANDLERS[hotspot.handler]();
    }

    // STEP 1 HANDLER STUB: later steps replace these empty panels with real
    // repair, expedition, records, sleep, dialogue, window, and plant screens.
    function openStubPanel(title, extraHtml = "") {
      activePanel = title;
      panelTitle.textContent = `${title} — (not built)`;
      panelBody.innerHTML = extraHtml || "<div>STEP 1 shell stub.</div>";
      modal.classList.add("is-open");
      modal.setAttribute("aria-hidden", "false");
      closePanelButton.focus();
      document.documentElement.dataset.activeShelterPanel = title;
      console.log("shelter panel:", title);
    }

    function closePanel() {
      activePanel = null;
      modal.classList.remove("is-open");
      modal.setAttribute("aria-hidden", "true");
      document.documentElement.dataset.activeShelterPanel = "";
      if (currentZoneId === "living") {
        setFocusedHotspot(focusedIndex, true);
      } else {
        updateZoneUi();
      }
    }

    function openRepair() {
      openStubPanel("REPAIR");
    }

    function enterStageFromShelter() {
      const departing = saveGame({
        ...saveState,
        stage: Math.max(1, Math.floor(Number(saveState.stage) || 1)),
        entryIntent: "continue",
        lastShelterExitAt: Date.now()
      });
      document.documentElement.dataset.shelterDeparting = "true";
      console.log("shelter depart:", departing);
      window.location.href = createStageEntryUrl(departing);
    }

    function departToCity() {
      openStubPanel("DEPART", `
        <div>Drone cradle link is ready.</div>
        <div class="panel-actions">
          <button class="panel-action-button" type="button" data-action="depart-stage">탐사 시작</button>
        </div>
      `);
      const departButton = panelBody.querySelector("[data-action='depart-stage']");
      departButton?.addEventListener("click", enterStageFromShelter);
      departButton?.focus();
    }

    function openWorkshopZone() {
      openStubPanel("WORKSHOP", `
        <div>Workbench and drone cradle are both reachable from this zone.</div>
        <div class="panel-actions">
          <button class="panel-action-button" type="button" data-action="open-repair">REPAIR</button>
          <button class="panel-action-button" type="button" data-action="depart-stage">DEPART</button>
        </div>
      `);
      panelBody.querySelector("[data-action='open-repair']")?.addEventListener("click", openRepair);
      panelBody.querySelector("[data-action='depart-stage']")?.addEventListener("click", enterStageFromShelter);
      panelBody.querySelector("[data-action='open-repair']")?.focus();
    }

    function openRecords() {
      openStubPanel("RECORDS", `
        <div class="panel-record-meta">CYCLE ${saveState.cycle} / DAY ${saveState.day}</div>
        <div>Found records, lore, and city map will live here.</div>
      `);
    }

    function sleepSave() {
      openStubPanel("SLEEP");
    }

    function talkToChild() {
      openStubPanel("TALK");
    }

    function lookOutside() {
      openStubPanel("WINDOW");
    }

    function drawWater() {
      openStubPanel("WATER");
    }

    function tendPlants() {
      openStubPanel("PLANTS");
    }

    window.SHELTER_HANDLERS = {
      openRepair,
      departToCity,
      openWorkshopZone,
      enterStageFromShelter,
      openRecords,
      sleepSave,
      talkToChild,
      lookOutside,
      drawWater,
      tendPlants
    };
    document.documentElement.dataset.shelterHandlers = Object.keys(window.SHELTER_HANDLERS).join(",");

    // KEYBOARD/GAMEPAD-FRIENDLY INPUT: WASD/arrows move between shelter zones.
    // Tab still cycles diegetic objects inside living; E/Enter/Space activates
    // the focused object or the current zone prompt.
    document.addEventListener("keydown", (event) => {
      shelterAudio.ensureStarted();
      if (activePanel) {
        if (event.key === "Escape") {
          event.preventDefault();
          closePanel();
        }
        return;
      }

      if (moveZoneForKey(event.key)) {
        event.preventDefault();
        return;
      }

      if (event.key === "Tab" && currentZoneId === "living") {
        event.preventDefault();
        setFocusedHotspot(focusedIndex + (event.shiftKey ? -1 : 1));
        return;
      }

      if ((event.key === "e" || event.key === "E") && currentZoneId !== "living") {
        event.preventDefault();
        activateCurrentZone();
        return;
      }

      if (event.key === "Enter" || event.key === " ") {
        event.preventDefault();
        activateCurrentZone();
      }
    });

    closePanelButton.addEventListener("click", closePanel);
    modal.addEventListener("click", (event) => {
      if (event.target === modal) closePanel();
    });

    scene.addEventListener("pointermove", (event) => {
      const rect = scene.getBoundingClientRect();
      if (!rect.width || !rect.height) return;
      setDroneLook(
        (event.clientX - rect.left) / rect.width,
        (event.clientY - rect.top) / rect.height,
        "pointer"
      );
    });

    scene.addEventListener("pointerdown", () => {
      shelterAudio.ensureStarted();
    });

    shelterAudioToggle.addEventListener("click", (event) => {
      event.stopPropagation();
      shelterAudio.toggle();
    });

    window.addEventListener("resize", () => {
      document.documentElement.dataset.viewport = `${window.innerWidth}x${window.innerHeight}`;
    });

    setupShelterBackground();
    applyArrivalFade();
    syncSaveDrivenVisuals();
    createDustMotes();
    startChildLifeLoop();
    renderHotspots();
    renderZoneMinimap();
    setActiveZoneSurface(ZONES.living);
    updateZoneUi();
    startRoomLifeLoop();
    document.documentElement.dataset.shelterReady = "true";
    document.documentElement.dataset.assetFallback = "loading:shelter_bg.png";
    document.documentElement.dataset.viewport = `${window.innerWidth}x${window.innerHeight}`;
  </script>
</body>
</html>
