<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>윤회 무명 — Shelter</title>
  <link rel="icon" href="data:,">
  <style>
    :root {
      color-scheme: dark;
      --ink: #ece9df;
      --ink-dim: rgba(236, 233, 223, 0.58);
      --ink-faint: rgba(236, 233, 223, 0.24);
      --warm: #e8b66b;
      --green: #8fae7a;
      --panel-bg: rgba(16, 14, 12, 0.84);
      --panel-line: rgba(236, 233, 223, 0.18);
      --sanity-light: 1;
      --room-drift-x: 0px;
      --room-drift-y: 0px;
      --near-drift-x: 0px;
      --near-drift-y: 0px;
      --zone-bg-opacity: 1;
      --zone-bg-scale: 1;
      --zone-transition-opacity: 0;
      --zone-transition-scale: 1.08;
      --drone-x: 0px;
      --drone-y: 0px;
      --drone-scale: 1;
      --child-x: 53%;
      --child-y: 47%;
      --child-gaze-x: 0px;
      --child-gaze-y: 0px;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #090807;
      font-family: Consolas, "D2Coding", "Cascadia Mono", monospace;
    }

    .shelter-shell {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 70% 24%, rgba(232, 182, 107, calc(0.12 * var(--sanity-light))), transparent 34%),
        linear-gradient(180deg, #11110f 0%, #080807 100%);
      color: var(--ink);
    }

    .shelter-shell::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 30;
      pointer-events: none;
      opacity: 0;
      background:
        radial-gradient(circle at 45% 48%, rgba(248, 228, 176, 0.1), transparent 34%),
        radial-gradient(circle at 50% 50%, transparent 0 52%, rgba(0, 0, 0, 0.24) 78%, rgba(0, 0, 0, 0.56) 100%);
      transition: opacity 900ms ease;
    }

    body.is-arriving .shelter-shell::after {
      opacity: 1;
    }

    .scene {
      position: relative;
      width: 100vw;
      height: 100vh;
      width: 100dvw;
      height: 100dvh;
      overflow: hidden;
      background: #11100e;
      isolation: isolate;
      cursor: crosshair;
    }

    .scene::before,
    .scene::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .scene::before {
      z-index: 6;
      background:
        radial-gradient(circle at 50% 47%, transparent 0 48%, rgba(18, 15, 12, 0.18) 70%, rgba(4, 3, 3, 0.5) 100%),
        linear-gradient(90deg, rgba(0, 0, 0, 0.18), transparent 16%, transparent 84%, rgba(0, 0, 0, 0.2));
      mix-blend-mode: multiply;
    }

    .scene::after {
      z-index: 6;
      background:
        radial-gradient(ellipse at 50% 47%, transparent 0 58%, rgba(180, 218, 198, 0.035) 76%, rgba(0, 0, 0, 0.16) 100%);
      backdrop-filter: blur(0.7px);
      mask-image: radial-gradient(circle at 50% 47%, transparent 0 55%, #000 76%);
    }

    .bg-layer {
      position: absolute;
      inset: 0;
      overflow: hidden;
      transform: translate3d(var(--room-drift-x), var(--room-drift-y), 0) scale(1.018);
      transition: transform 520ms ease-out;
      background:
        linear-gradient(180deg, rgba(43, 41, 35, 0.78) 0%, rgba(22, 20, 17, 0.92) 100%),
        radial-gradient(circle at 76% 30%, rgba(232, 182, 107, 0.22), transparent 28%),
        radial-gradient(circle at 22% 68%, rgba(107, 139, 100, 0.18), transparent 26%);
    }

    .shelter-bg-image {
      position: absolute;
      inset: 0;
      z-index: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      opacity: var(--zone-bg-opacity);
      transform: scale(var(--zone-bg-scale));
      transition: opacity 120ms linear, transform 120ms ease-out;
      user-select: none;
      -webkit-user-drag: none;
    }

    .zone-placeholder,
    .zone-transition-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .zone-placeholder {
      z-index: 0;
      display: grid;
      place-items: center;
      opacity: 0;
      transition: opacity 160ms linear, transform 160ms ease-out;
      transform: scale(var(--zone-bg-scale));
      background:
        linear-gradient(120deg, rgba(232, 182, 107, 0.08), transparent 42%),
        radial-gradient(circle at 50% 42%, rgba(143, 174, 122, 0.14), transparent 34%),
        repeating-linear-gradient(90deg, rgba(236, 233, 223, 0.035) 0 1px, transparent 1px 72px),
        repeating-linear-gradient(0deg, rgba(236, 233, 223, 0.03) 0 1px, transparent 1px 72px),
        linear-gradient(180deg, #191a15 0%, #0f0e0c 100%);
    }

    .zone-placeholder.is-active {
      opacity: var(--zone-bg-opacity);
    }

    .zone-placeholder-card {
      display: grid;
      gap: 12px;
      place-items: center;
      width: min(520px, calc(100vw - 48px));
      padding: 32px 24px;
      border: 1px solid rgba(236, 233, 223, 0.14);
      background: rgba(10, 9, 8, 0.36);
      color: rgba(236, 233, 223, 0.62);
      text-align: center;
      box-shadow: inset 0 0 80px rgba(0, 0, 0, 0.18);
    }

    .zone-placeholder-title {
      font-size: clamp(20px, 3.2vw, 42px);
      color: rgba(236, 233, 223, 0.78);
      letter-spacing: 0;
    }

    .zone-placeholder-subtitle {
      font-size: 12px;
      color: rgba(236, 233, 223, 0.42);
    }

    .zone-transition-layer {
      z-index: 2;
      opacity: var(--zone-transition-opacity);
      transform: scale(var(--zone-transition-scale));
      transform-origin: center center;
      transition: none;
    }

    .zone-transition-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      opacity: 0;
      user-select: none;
      -webkit-user-drag: none;
    }

    .zone-transition-layer.has-image .zone-transition-image {
      opacity: 1;
    }

    .zone-transition-placeholder {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      opacity: 0;
      background:
        linear-gradient(120deg, rgba(232, 182, 107, 0.1), transparent 44%),
        radial-gradient(circle at 50% 42%, rgba(143, 174, 122, 0.14), transparent 34%),
        repeating-linear-gradient(90deg, rgba(236, 233, 223, 0.035) 0 1px, transparent 1px 72px),
        repeating-linear-gradient(0deg, rgba(236, 233, 223, 0.03) 0 1px, transparent 1px 72px),
        linear-gradient(180deg, #191a15 0%, #0f0e0c 100%);
    }

    .zone-transition-layer.has-placeholder .zone-transition-placeholder {
      opacity: 1;
    }

    .room-sketch {
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      opacity: 0.68;
    }

    .room-sketch::after {
      content: "";
      position: absolute;
      left: 34%;
      top: -8%;
      width: 34%;
      height: 88%;
      pointer-events: none;
      background: linear-gradient(104deg, rgba(248, 238, 220, 0.22), rgba(184, 237, 225, 0.08) 42%, transparent 70%);
      mix-blend-mode: screen;
      opacity: 0.2;
      filter: blur(10px);
      transform-origin: top center;
      animation: lightShaft 12s ease-in-out infinite alternate;
    }

    .window-glow {
      position: absolute;
      left: 30%;
      top: 13%;
      width: 42%;
      height: 52%;
      border: 0;
      background: transparent;
      box-shadow: 0 0 80px rgba(184, 237, 225, calc(0.12 * var(--sanity-light)));
      overflow: hidden;
    }

    .water-shimmer {
      position: absolute;
      inset: 58% -10% 2%;
      background:
        repeating-linear-gradient(0deg, rgba(236, 247, 245, 0.2) 0 1px, transparent 1px 11px),
        linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.18), transparent);
      opacity: 0.18;
      transform: skewX(-9deg);
      animation: waterShimmer 8.6s ease-in-out infinite alternate;
    }

    .floor {
      display: none;
    }

    .soft-dust {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 18% 30%, rgba(143, 174, 122, 0.08), transparent 18%),
        radial-gradient(circle at 50% 72%, rgba(232, 182, 107, 0.07), transparent 28%),
        radial-gradient(circle at 75% 65%, rgba(236, 233, 223, 0.04), transparent 24%);
      mix-blend-mode: screen;
    }

    .room-life {
      position: absolute;
      inset: 0;
      z-index: 4;
      pointer-events: none;
      transform: translate3d(var(--near-drift-x), var(--near-drift-y), 0);
      transition: transform 520ms ease-out, opacity 420ms ease;
    }

    .room-life.is-zone-muted {
      opacity: 0;
    }

    .hanging-bulb {
      position: absolute;
      left: 48%;
      top: 5%;
      width: 1px;
      height: 21%;
      transform-origin: top center;
      background: rgba(236, 233, 223, 0.22);
      animation: bulbSway 7.8s ease-in-out infinite;
    }

    .hanging-bulb::after {
      content: "";
      position: absolute;
      left: -8px;
      bottom: -12px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: rgba(248, 228, 176, 0.52);
      box-shadow: 0 0 34px rgba(232, 182, 107, 0.32), 0 0 90px rgba(232, 182, 107, 0.16);
      animation: bulbFlicker 5.4s linear infinite;
    }

    .laundry-line {
      position: absolute;
      left: 61%;
      top: 19%;
      width: 19%;
      height: 1px;
      background: rgba(236, 233, 223, 0.16);
      transform: rotate(7deg);
    }

    .laundry-line span {
      position: absolute;
      top: 2px;
      width: 24px;
      height: 34px;
      border-radius: 2px 2px 7px 7px;
      background: rgba(236, 233, 223, 0.12);
      transform-origin: top center;
      animation: laundryDrift 9s ease-in-out infinite;
    }

    .laundry-line span:nth-child(1) {
      left: 16%;
      animation-delay: -1.8s;
    }

    .laundry-line span:nth-child(2) {
      left: 42%;
      height: 42px;
      animation-delay: -4.1s;
    }

    .laundry-line span:nth-child(3) {
      left: 68%;
      animation-delay: -6.3s;
    }

    .plant-life {
      position: absolute;
      left: 54%;
      top: 48%;
      width: 82px;
      height: 80px;
    }

    .plant-life::before {
      content: "";
      position: absolute;
      left: 22px;
      bottom: 0;
      width: 38px;
      height: 19px;
      border-radius: 0 0 12px 12px;
      background: rgba(70, 52, 36, 0.42);
    }

    .plant-life span {
      position: absolute;
      left: 38px;
      bottom: 16px;
      width: 9px;
      height: 42px;
      border-radius: 50% 50% 0 50%;
      background: rgba(143, 174, 122, 0.32);
      transform-origin: bottom center;
      animation: leafMove 6.8s ease-in-out infinite;
    }

    .plant-life span:nth-child(1) {
      transform: rotate(-34deg);
      animation-delay: -1.4s;
    }

    .plant-life span:nth-child(2) {
      height: 54px;
      transform: rotate(-9deg);
      animation-delay: -3.7s;
    }

    .plant-life span:nth-child(3) {
      transform: rotate(24deg);
      animation-delay: -5.2s;
    }

    .record-terminal-glow {
      position: absolute;
      left: 77.5%;
      top: 42%;
      width: 4.8%;
      height: 8.4%;
      border-radius: 2px;
      background: rgba(183, 226, 208, 0.12);
      box-shadow: 0 0 18px rgba(183, 226, 208, 0.18);
      animation: terminalFlicker 4.2s steps(4, end) infinite;
    }

    .dust-mote {
      position: absolute;
      width: 2px;
      height: 2px;
      border-radius: 50%;
      background: rgba(248, 238, 220, 0.42);
      box-shadow: 0 0 7px rgba(248, 238, 220, 0.3);
      opacity: 0.32;
      animation: dustFloat var(--dust-dur, 12s) linear infinite;
      animation-delay: var(--dust-delay, 0s);
    }

    .child-actor {
      position: absolute;
      left: var(--child-x);
      top: var(--child-y);
      z-index: 6;
      width: 44px;
      height: 96px;
      transform: translate(-50%, -100%);
      transition: left 3200ms cubic-bezier(0.22, 0.7, 0.22, 1), top 3200ms cubic-bezier(0.22, 0.7, 0.22, 1), filter 360ms ease;
      filter: drop-shadow(0 18px 22px rgba(0, 0, 0, 0.34));
    }

    .child-actor.is-aware {
      filter: drop-shadow(0 18px 22px rgba(0, 0, 0, 0.34)) drop-shadow(0 0 18px rgba(248, 228, 176, 0.16));
    }

    .child-head {
      position: absolute;
      left: 50%;
      top: 7px;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: rgba(238, 240, 235, 0.84);
      transform: translateX(-50%) translate(var(--child-gaze-x), var(--child-gaze-y));
      transition: transform 420ms ease;
    }

    .child-head::after {
      content: "";
      position: absolute;
      left: 5px;
      top: 10px;
      width: 14px;
      height: 4px;
      border-radius: 999px;
      background: rgba(20, 18, 17, 0.32);
      opacity: 0.7;
    }

    .child-body {
      position: absolute;
      left: 50%;
      top: 32px;
      width: 23px;
      height: 44px;
      border-radius: 10px 10px 6px 6px;
      background: rgba(24, 22, 21, 0.58);
      transform: translateX(-50%);
      animation: childBreath 3.8s ease-in-out infinite;
    }

    .child-arm {
      position: absolute;
      top: 40px;
      width: 7px;
      height: 34px;
      border-radius: 999px;
      background: rgba(35, 31, 29, 0.5);
      transform-origin: top center;
      animation: childHands 5.6s ease-in-out infinite;
    }

    .child-arm.left {
      left: 8px;
    }

    .child-arm.right {
      right: 8px;
      animation-delay: -2.8s;
    }

    .child-ambient-line {
      position: absolute;
      left: 50%;
      top: -12px;
      min-width: 150px;
      transform: translate(-50%, -100%);
      padding: 7px 10px;
      border: 1px solid rgba(248, 228, 176, 0.16);
      background: rgba(10, 8, 7, 0.52);
      color: rgba(248, 238, 220, 0.78);
      font: 13px/1.25 "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
      text-align: center;
      opacity: 0;
      transition: opacity 620ms ease, transform 620ms ease;
    }

    .child-ambient-line.is-visible {
      opacity: 1;
      transform: translate(-50%, -118%);
    }

    .drone-reticle {
      position: absolute;
      left: 50%;
      top: 50%;
      z-index: 9;
      width: 42px;
      height: 42px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      pointer-events: none;
      opacity: 0.24;
      transition: opacity 300ms ease;
    }

    .drone-reticle::before,
    .drone-reticle::after {
      content: "";
      position: absolute;
      inset: 50% auto auto 50%;
      width: 26px;
      height: 1px;
      transform: translate(-50%, -50%);
      background: rgba(236, 233, 223, 0.28);
    }

    .drone-reticle::after {
      width: 1px;
      height: 26px;
    }

    .drone-vignette {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 48%, transparent 0 58%, rgba(0, 0, 0, 0.26) 82%, rgba(0, 0, 0, 0.64) 100%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.035), transparent 16%, transparent 84%, rgba(0, 0, 0, 0.14));
      z-index: 5;
    }

    .hud {
      position: absolute;
      left: clamp(18px, 3vw, 38px);
      top: clamp(18px, 3vw, 34px);
      display: flex;
      gap: 16px;
      align-items: center;
      z-index: 8;
      color: rgba(236, 233, 223, 0.64);
      font-size: 12px;
      text-shadow: 0 0 12px rgba(0, 0, 0, 0.5);
      transition: opacity 900ms ease;
    }

    .hud span {
      color: rgba(236, 233, 223, 0.38);
    }

    .sanity-aura {
      position: absolute;
      left: 53%;
      top: 42%;
      width: 13vmin;
      height: 13vmin;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(232, 182, 107, calc(0.18 * var(--sanity-light))), transparent 68%);
      pointer-events: none;
      z-index: 2;
    }

    #hotspotLayer {
      position: absolute;
      inset: 0;
      z-index: 7;
      transition: opacity 900ms ease;
      transform: translate3d(var(--near-drift-x), var(--near-drift-y), 0);
    }

    body.is-arriving .hud,
    body.is-arriving .zone-minimap,
    body.is-arriving #hotspotLayer {
      opacity: 0;
      pointer-events: none;
    }

    .hotspot {
      position: absolute;
      z-index: 7;
      border: 1px solid transparent;
      border-radius: 50%;
      background: rgba(232, 182, 107, 0);
      box-shadow: none;
      cursor: pointer;
      transform: translate(-50%, -50%);
      transition: border-color 420ms ease, background 420ms ease, box-shadow 420ms ease, transform 420ms ease;
    }

    .hotspot::before {
      content: "";
      position: absolute;
      inset: 18%;
      border-radius: 50%;
      border: 1px solid rgba(236, 233, 223, 0.08);
    }

    .hotspot.is-near,
    .hotspot.is-focused,
    .hotspot:focus-visible {
      border-color: rgba(232, 182, 107, 0.46);
      background: rgba(232, 182, 107, 0.08);
      box-shadow: 0 0 30px rgba(232, 182, 107, 0.24), inset 0 0 28px rgba(232, 182, 107, 0.08);
      transform: translate(-50%, -50%) scale(1.035);
      outline: none;
    }

    .hotspot.is-zone-hidden {
      opacity: 0;
      pointer-events: none;
    }

    .zone-minimap {
      position: absolute;
      left: clamp(18px, 3vw, 38px);
      bottom: clamp(18px, 3vw, 34px);
      z-index: 12;
      width: clamp(210px, 20vw, 286px);
      aspect-ratio: 1.42;
      padding: 8px;
      border: 1px solid rgba(236, 233, 223, 0.12);
      background: rgba(8, 7, 6, 0.34);
      transition: opacity 420ms ease;
    }

    .floor-plan-layer {
      position: absolute;
      inset: 8px;
      pointer-events: none;
    }

    .floor-plan-link-layer {
      position: absolute;
      inset: 8px;
      pointer-events: none;
    }

    .floor-plan-link {
      position: absolute;
      height: 1px;
      background: rgba(143, 174, 122, 0.18);
      opacity: 0.42;
      transform-origin: 0 50%;
      transition: opacity 180ms ease, background 180ms ease, box-shadow 180ms ease;
    }

    .floor-plan-link.is-active {
      background: rgba(232, 182, 107, 0.5);
      box-shadow: 0 0 8px rgba(232, 182, 107, 0.28);
      opacity: 0.86;
    }

    .floor-plan-shape {
      position: absolute;
      box-sizing: border-box;
      border: 1px solid rgba(236, 233, 223, 0.14);
      background: rgba(236, 233, 223, 0.022);
    }

    .floor-plan-shape.is-wall {
      border: 2px solid rgba(236, 233, 223, 0.28);
      background: transparent;
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.38);
    }

    .floor-plan-shape.is-corridor {
      border-color: rgba(236, 233, 223, 0.18);
      background: rgba(236, 233, 223, 0.05);
    }

    .floor-plan-shape.is-utility {
      border-color: rgba(175, 212, 225, 0.2);
      background: rgba(155, 205, 220, 0.06);
    }

    .floor-plan-shape.is-grid {
      background:
        linear-gradient(rgba(236, 233, 223, 0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(236, 233, 223, 0.07) 1px, transparent 1px),
        rgba(236, 233, 223, 0.025);
      background-size: 8px 8px;
    }

    .floor-plan-shape.is-elevator::before,
    .floor-plan-shape.is-elevator::after {
      content: "";
      position: absolute;
      inset: 13% 18%;
      border-top: 1px solid rgba(236, 233, 223, 0.24);
      transform: rotate(45deg);
      transform-origin: center;
    }

    .floor-plan-shape.is-elevator::after {
      transform: rotate(-45deg);
    }

    .floor-plan-shape.is-stairs {
      background:
        repeating-linear-gradient(0deg, rgba(236, 233, 223, 0.18) 0 1px, transparent 1px 6px),
        rgba(236, 233, 223, 0.03);
    }

    .floor-plan-shape.is-door {
      border: 0;
      border-left: 1px solid rgba(236, 233, 223, 0.24);
      border-bottom: 1px solid rgba(236, 233, 223, 0.18);
      border-radius: 0 0 0 100%;
      background: transparent;
    }

    .floor-plan-shape.is-fixture {
      border-color: rgba(176, 218, 230, 0.28);
      border-radius: 999px;
      background: rgba(176, 218, 230, 0.055);
    }

    .floor-plan-shape::after {
      content: attr(data-label);
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: rgba(236, 233, 223, 0.24);
      font: 700 7px/1 Consolas, "D2Coding", monospace;
      letter-spacing: 0;
    }

    .zone-map-cell {
      position: absolute;
      appearance: none;
      padding: 0;
      border: 1px solid rgba(236, 233, 223, 0.14);
      background: rgba(236, 233, 223, 0.04);
      opacity: 0.32;
      cursor: default;
      transition: opacity 240ms ease, border-color 240ms ease, background 240ms ease, box-shadow 240ms ease;
    }

    .zone-map-cell[data-zone-id="living"],
    .zone-map-cell[data-zone-id="kitchen"] {
      background: rgba(232, 182, 107, 0.12);
      border-color: rgba(232, 182, 107, 0.2);
    }

    .zone-map-cell[data-zone-id="bathroom"] {
      background: rgba(155, 205, 220, 0.12);
      border-color: rgba(155, 205, 220, 0.24);
    }

    .zone-map-cell[data-zone-id^="balcony"] {
      background:
        linear-gradient(rgba(236, 233, 223, 0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(236, 233, 223, 0.06) 1px, transparent 1px),
        rgba(236, 233, 223, 0.025);
      background-size: 8px 8px;
    }

    .zone-minimap.is-editing {
      border-color: rgba(232, 182, 107, 0.42);
      background: rgba(12, 10, 8, 0.58);
      box-shadow: 0 0 22px rgba(232, 182, 107, 0.1);
    }

    const shelterDialogueResult = document.getElementById("shelterDialogueResult");
    const shelterDialogueChoices = document.getElementById("shelterDialogueChoices");

    let saveState = normalizeSave(loadSave() || DEFAULT_SAVE);
    let focusedIndex = 0;
    let activePanel = null;
    let shelterDialogueState = createShelterDialogueState();
    let shelterDialogueFrameId = 0;
    let childBehaviorIndex = 0;
    let childBehaviorTimer = 0;
    let childLineTimer = 0;
    let roomLifeFrameId = 0;
    let zoneTransitionFrameId = 0;
    let currentZoneId = "living";
    let zoneTransitionState = null;
    let zoneLayoutEditMode = false;
    let zoneLayoutDirty = false;
    let zoneLayoutDrag = null;
    let zoneLinkLayer = null;
    let zoneRouteQueue = [];
    let zoneRouteTargetId = "";
    let lastReactiveLineAt = -Infinity;
    const droneLook = {
      x: 0.5,
      y: 0.5,
      source: "arrival",
      nearestHotspotId: "",
      lastMovedAt: performance.now()
    };

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function lerp(a, b, t) {
      return a + (b - a) * clamp(t, 0, 1);
    }

    function clonePlain(value, fallback) {
      try {
        return JSON.parse(JSON.stringify(value ?? fallback));
      } catch {
        return fallback;
      }
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function isUrlFlagEnabled(name) {
      const value = new URLSearchParams(window.location.search).get(name);
      return value === "" || value === "1" || value === "true" || value === "yes";
    }

    function distance2d(a, b) {
      return Math.hypot(a.x - b.x, a.y - b.y);
    }

    function hotspotPoint(hotspot) {
      return { x: hotspot.x / 100, y: hotspot.y / 100 };
    }

    function childPoint() {
      const behavior = CHILD_BEHAVIORS[childBehaviorIndex] || CHILD_BEHAVIORS[0];
      return { x: behavior.x / 100, y: behavior.y / 100 };
    }

    function easeInOutCubic(t) {
      const n = clamp(t, 0, 1);
      return n < 0.5 ? 4 * n * n * n : 1 - Math.pow(-2 * n + 2, 3) / 2;
    }

    function roundLayoutValue(value) {
      return Math.round(value * 10) / 10;
    }

    function normalizeZoneMap(raw, fallback) {
      const base = fallback || { x: 0, y: 0, w: 12, h: 12 };
      const w = clamp(Number(raw?.w ?? base.w), 6, 94);
      const h = clamp(Number(raw?.h ?? base.h), 5, 94);
      return {
        x: roundLayoutValue(clamp(Number(raw?.x ?? base.x), 0, 100 - w)),
        y: roundLayoutValue(clamp(Number(raw?.y ?? base.y), 0, 100 - h)),
        w: roundLayoutValue(w),
        h: roundLayoutValue(h)
      };
    }

    function readSavedZoneLayout() {
      try {
        const parsed = JSON.parse(localStorage.getItem(SHELTER_LAYOUT_KEY) || "null");
        return parsed && typeof parsed === "object" ? parsed : null;
      } catch {
        return null;
      }
    }

    function applyZoneLayout(layout) {
      Object.values(ZONES).forEach((zone) => {
        const fallback = DEFAULT_ZONE_MAPS[zone.id];
        const next = normalizeZoneMap(layout?.[zone.id], fallback);
        zone.map.x = next.x;
        zone.map.y = next.y;
        zone.map.w = next.w;
        zone.map.h = next.h;
      });
    }

    function captureZoneLayout() {
      return Object.fromEntries(Object.values(ZONES).map((zone) => [
        zone.id,
        normalizeZoneMap(zone.map, DEFAULT_ZONE_MAPS[zone.id])
      ]));
    }

    function saveZoneLayout(source = "manual") {
      try {
        localStorage.setItem(SHELTER_LAYOUT_KEY, JSON.stringify(captureZoneLayout()));
        zoneLayoutDirty = false;
        document.documentElement.dataset.shelterLayoutSaved = source;
      } catch (error) {
        console.warn("shelter layout save failed", error);
        document.documentElement.dataset.shelterLayoutSaved = "failed";
      }
      updateZoneLayoutTools();
    }

    function resetZoneLayout() {
      applyZoneLayout(DEFAULT_ZONE_MAPS);
      zoneLayoutDirty = false;
      try {
        localStorage.removeItem(SHELTER_LAYOUT_KEY);
      } catch {}
      renderZoneMinimap();
      updateZoneUi();
      document.documentElement.dataset.shelterLayoutSaved = "reset";
    }

    function applyMapToCell(cell, map) {
      cell.style.left = `${map.x}%`;
      cell.style.top = `${map.y}%`;
      cell.style.width = `${map.w}%`;
      cell.style.height = `${map.h}%`;
    }

    function setZoneLayoutEditMode(enabled) {
      zoneLayoutEditMode = Boolean(enabled);
      document.documentElement.dataset.shelterLayoutEdit = zoneLayoutEditMode ? "true" : "false";
      if (!zoneLayoutEditMode && zoneLayoutDirty) {
        saveZoneLayout("edit-close");
      }
      zoneMinimap?.classList.toggle("is-editing", zoneLayoutEditMode);
      updateZoneLayoutTools();
      updateZoneUi();
    }

    function updateZoneLayoutTools() {
      if (!zoneMinimap) return;
      zoneMinimap.classList.toggle("is-editing", zoneLayoutEditMode);
      const editButton = zoneMinimap.querySelector("[data-layout-action='edit']");
      const saveButton = zoneMinimap.querySelector("[data-layout-action='save']");
      const resetButton = zoneMinimap.querySelector("[data-layout-action='reset']");
      if (editButton) {
        editButton.textContent = zoneLayoutEditMode ? "DONE" : "EDIT";
        editButton.classList.toggle("is-active", zoneLayoutEditMode);
        editButton.setAttribute("aria-pressed", zoneLayoutEditMode ? "true" : "false");
      }
      if (saveButton) {
        saveButton.disabled = !zoneLayoutDirty;
      }
      if (resetButton) {
        resetButton.disabled = false;
      }
    }

    function createZoneLayoutTools() {
      const tools = document.createElement("div");
      tools.className = "zone-layout-tools";
      [
        ["edit", "EDIT"],
        ["save", "SAVE"],
        ["reset", "RST"]
      ].forEach(([action, label]) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "zone-layout-tool";
        button.dataset.layoutAction = action;
        button.textContent = label;
        button.addEventListener("click", (event) => {
          event.stopPropagation();
          if (action === "edit") {
            setZoneLayoutEditMode(!zoneLayoutEditMode);
          } else if (action === "save") {
            saveZoneLayout("button");
          } else {
            resetZoneLayout();
          }
        });
        tools.append(button);
      });
      return tools;
    }

    function createFloorPlanLayer() {
      const layer = document.createElement("div");
      layer.className = "floor-plan-layer";
      FLOOR_PLAN_SHAPES.forEach((shape) => {
        const item = document.createElement("div");
        item.className = `floor-plan-shape is-${shape.kind}`;
        item.dataset.shapeId = shape.id;
        item.dataset.label = shape.label || "";
        item.style.left = `${shape.x}%`;
        item.style.top = `${shape.y}%`;
        item.style.width = `${shape.w}%`;
        item.style.height = `${shape.h}%`;
        layer.append(item);
      });
      return layer;
    }

    function getZoneConnectionPairs() {
      const seen = new Set();
      const pairs = [];
      Object.values(ZONES).forEach((zone) => {
        zone.adjacent.forEach((adjacentId) => {
          if (!ZONES[adjacentId]) return;
          const key = [zone.id, adjacentId].sort().join("__");
          if (seen.has(key)) return;
          seen.add(key);
          pairs.push([zone.id, adjacentId]);
        });
      });
      return pairs;
    }

    function createZoneConnectionLayer() {
      const layer = document.createElement("div");
      layer.className = "floor-plan-link-layer";
      getZoneConnectionPairs().forEach(([from, to]) => {
        const link = document.createElement("div");
        link.className = "floor-plan-link";
        link.dataset.fromZone = from;
        link.dataset.toZone = to;
        layer.append(link);
      });
      return layer;
    }

    function updateZoneConnectionLayer() {
      if (!zoneLinkLayer) return;
      const bounds = zoneLinkLayer.getBoundingClientRect();
      const width = Math.max(1, bounds.width);
      const height = Math.max(1, bounds.height);
      zoneLinkLayer.querySelectorAll(".floor-plan-link").forEach((link) => {
        const fromZone = zoneById(link.dataset.fromZone);
        const toZone = zoneById(link.dataset.toZone);
        const from = zoneCenter(fromZone);
        const to = zoneCenter(toZone);
        const dx = to.x - from.x;
        const dy = to.y - from.y;
        const dxPx = dx / 100 * width;
        const dyPx = dy / 100 * height;
        const length = Math.hypot(dxPx, dyPx) / width * 100;
        const angle = Math.atan2(dyPx, dxPx) * 180 / Math.PI;
        link.style.left = `${from.x}%`;
        link.style.top = `${from.y}%`;
        link.style.width = `${length}%`;
        link.style.transform = `rotate(${angle}deg)`;
        link.classList.toggle(
          "is-active",
          currentZoneId === fromZone.id || currentZoneId === toZone.id
        );
      });
    }

    function beginZoneMapDrag(event, zone, cell) {
      if (!zoneLayoutEditMode || event.button !== 0) return;
      event.preventDefault();
      event.stopPropagation();
      const bounds = zoneMinimap.getBoundingClientRect();
      zoneLayoutDrag = {
        zoneId: zone.id,
        pointerId: event.pointerId,
        cell,
        bounds,
        startX: event.clientX,
        startY: event.clientY,
        startMap: { ...zone.map },
        moved: false
      };
      cell.classList.add("is-dragging");
      cell.setPointerCapture?.(event.pointerId);
      document.documentElement.dataset.shelterLayoutDragging = zone.id;
    }

    function updateZoneMapDrag(event) {
      const drag = zoneLayoutDrag;
      if (!drag || drag.pointerId !== event.pointerId) return;
      event.preventDefault();
      event.stopPropagation();
      const zone = zoneById(drag.zoneId);
      const dx = (event.clientX - drag.startX) / Math.max(1, drag.bounds.width) * 100;
      const dy = (event.clientY - drag.startY) / Math.max(1, drag.bounds.height) * 100;
      const next = normalizeZoneMap({
        ...drag.startMap,
        x: drag.startMap.x + dx,
        y: drag.startMap.y + dy
      }, DEFAULT_ZONE_MAPS[zone.id]);
      zone.map.x = next.x;
      zone.map.y = next.y;
      zone.map.w = next.w;
      zone.map.h = next.h;
      drag.moved = drag.moved || Math.abs(dx) > 0.25 || Math.abs(dy) > 0.25;
      zoneLayoutDirty = true;
      applyMapToCell(drag.cell, zone.map);
      updateZoneConnectionLayer();
      updateZoneLayoutTools();
    }

    function finishZoneMapDrag(event) {
      const drag = zoneLayoutDrag;
      if (!drag || drag.pointerId !== event.pointerId) return;
      event.preventDefault();
      event.stopPropagation();
      drag.cell.classList.remove("is-dragging");
      drag.cell.releasePointerCapture?.(event.pointerId);
      if (drag.moved) {
        drag.cell.dataset.justDragged = "true";
        window.setTimeout(() => {
          delete drag.cell.dataset.justDragged;
        }, 0);
        saveZoneLayout("drop");
      }
      zoneLayoutDrag = null;
      document.documentElement.dataset.shelterLayoutDragging = "";
      updateZoneUi();
    }

    function zoneById(zoneId) {
      return ZONES[zoneId] || ZONES.living;
    }

    function zoneArt(zone) {
      return ART_HOOKS.shelter.zones[zone.artKey] || {};
    }

    function zoneImageSrc(zone) {
      return zoneArt(zone).backgroundSrc || (zone.id === "living" ? SHELTER_BG_SRC : "");
    }

    function zoneHasUsableImage(zone) {
      if (zone.kind !== "image") return false;
      if (!zoneImageSrc(zone)) return false;
      return !(zone.id === "living" && document.documentElement.dataset.shelterBackground === "missing:shelter_bg.png");
    }

    function setPlaceholderContent(surface, zone) {
      if (!surface) return;
      const title = surface.querySelector(".zone-placeholder-title");
      const subtitle = surface.querySelector(".zone-placeholder-subtitle");
      if (title) title.textContent = zone.placeholderTitle || zone.label || zone.id;
      if (subtitle) subtitle.textContent = zone.placeholderSubtitle || "REPLACE: room asset hook";
    }

    function setActiveZoneSurface(zone) {
      const useImage = zoneHasUsableImage(zone);
      if (shelterBgImage) {
        shelterBgImage.hidden = !useImage;
      }
      if (zonePlaceholder) {
        if (useImage) {
          zonePlaceholder.classList.remove("is-active");
        } else {
          setPlaceholderContent(zonePlaceholder, zone);
          zonePlaceholder.classList.add("is-active");
        }
      }
    }

    function setTransitionZoneSurface(zone) {
      if (!zoneTransitionLayer) return;
      zoneTransitionLayer.classList.remove("has-image", "has-placeholder");
      const useImage = zoneHasUsableImage(zone);
      if (useImage && zoneTransitionImage) {
        zoneTransitionImage.onload = () => {
          zoneTransitionLayer.classList.add("has-image");
          zoneTransitionLayer.classList.remove("has-placeholder");
        };
        zoneTransitionImage.onerror = () => {
          setPlaceholderContent(zoneTransitionPlaceholder, {
            ...zone,
            placeholderSubtitle: "missing room image; using placeholder"
          });
          zoneTransitionLayer.classList.remove("has-image");
          zoneTransitionLayer.classList.add("has-placeholder");
        };
        if (zoneTransitionImage.getAttribute("src") !== zoneImageSrc(zone)) {
          zoneTransitionImage.src = zoneImageSrc(zone);
        } else {
          zoneTransitionLayer.classList.add("has-image");
        }
        return;
      }

      if (zoneTransitionImage) {
        zoneTransitionImage.removeAttribute("src");
      }
      setPlaceholderContent(zoneTransitionPlaceholder, zone);
      zoneTransitionLayer.classList.add("has-placeholder");
    }

    function setZoneTransitionProgress(progress) {
      const t = clamp(progress, 0, 1);
      const activeScale = lerp(1, ZONE_TRANSITION.zoomScale, t);
      const incomingScale = lerp(ZONE_TRANSITION.incomingStartScale, 1, t);
      document.documentElement.style.setProperty("--zone-bg-opacity", (1 - t).toFixed(3));
      document.documentElement.style.setProperty("--zone-bg-scale", activeScale.toFixed(4));
      document.documentElement.style.setProperty("--zone-transition-opacity", t.toFixed(3));
      document.documentElement.style.setProperty("--zone-transition-scale", incomingScale.toFixed(4));
    }

    function resetZoneTransitionSurface() {
      document.documentElement.style.setProperty("--zone-bg-opacity", "1");
      document.documentElement.style.setProperty("--zone-bg-scale", "1");
      document.documentElement.style.setProperty("--zone-transition-opacity", "0");
      document.documentElement.style.setProperty("--zone-transition-scale", String(ZONE_TRANSITION.incomingStartScale));
      zoneTransitionLayer?.classList.remove("has-image", "has-placeholder");
      if (zoneTransitionImage) {
        zoneTransitionImage.onload = null;
        zoneTransitionImage.onerror = null;
        zoneTransitionImage.removeAttribute("src");
      }
    }

    function renderZoneMinimap() {
      if (!zoneMinimap) return;
      zoneMinimap.innerHTML = "";
      zoneMinimap.append(createFloorPlanLayer());
      zoneLinkLayer = createZoneConnectionLayer();
      zoneMinimap.append(zoneLinkLayer);
      zoneMinimap.append(createZoneLayoutTools());
      Object.values(ZONES).forEach((zone) => {
        const cell = document.createElement("button");
        cell.type = "button";
        cell.className = "zone-map-cell is-room";
        cell.dataset.zoneId = zone.id;
        cell.dataset.short = zone.short || zone.label.slice(0, 3).toUpperCase();
        cell.title = zone.label;
        cell.setAttribute("aria-label", zone.label);
        applyMapToCell(cell, zone.map);
        cell.addEventListener("pointerdown", (event) => beginZoneMapDrag(event, zone, cell));
        cell.addEventListener("pointermove", updateZoneMapDrag);
        cell.addEventListener("pointerup", finishZoneMapDrag);
        cell.addEventListener("pointercancel", finishZoneMapDrag);
        cell.addEventListener("click", (event) => {
          if (zoneLayoutEditMode || cell.dataset.justDragged === "true") {
            event.preventDefault();
            event.stopPropagation();
            return;
          }
          if (canRouteToZone(zone.id)) beginZoneRoute(zone.id);
        });
        zoneMinimap.append(cell);
      });
      updateZoneLayoutTools();
      updateZoneConnectionLayer();
    }

    function updateZoneUi() {
      const zone = zoneById(currentZoneId);
      document.documentElement.dataset.shelterZone = zone.id;
      document.documentElement.dataset.zoneTransitionMs = String(ZONE_TRANSITION.durationMs);
      document.documentElement.dataset.zoneParallaxPx = String(ZONE_TRANSITION.parallaxPx);

      zoneMinimap?.querySelectorAll(".zone-map-cell").forEach((cell) => {
        const zoneId = cell.dataset.zoneId;
        const routeable = canRouteToZone(zoneId);
        cell.classList.toggle("is-current", zoneId === zone.id);
        cell.classList.toggle("is-adjacent", zone.adjacent.includes(zoneId));
        cell.classList.toggle("is-routeable", routeable);
        cell.disabled = !zoneLayoutEditMode && zoneId !== zone.id && !routeable;
      });
      updateZoneConnectionLayer();

      const showLivingHotspots = zone.id === "living";
      getHotspotButtons().forEach((button) => {
        button.classList.toggle("is-zone-hidden", !showLivingHotspots);
        button.tabIndex = showLivingHotspots && button.classList.contains("is-focused") ? 0 : -1;
      });
      roomLife?.classList.toggle("is-zone-muted", !showLivingHotspots);

    }

    function zoneCenter(zone) {
      return {
        x: zone.map.x + zone.map.w / 2,
        y: zone.map.y + zone.map.h / 2
      };
    }

    function canMoveToZone(zoneId) {
      if (zoneId === currentZoneId) return false;
      return zoneById(currentZoneId).adjacent.includes(zoneId);
    }

    function findZoneRoute(fromZoneId, toZoneId) {
      if (fromZoneId === toZoneId || !ZONES[fromZoneId] || !ZONES[toZoneId]) {
        return null;
      }
      const queue = [[fromZoneId]];
      const seen = new Set([fromZoneId]);
      while (queue.length) {
        const route = queue.shift();
        const zone = zoneById(route[route.length - 1]);
        for (const nextZoneId of zone.adjacent) {
          if (seen.has(nextZoneId) || !ZONES[nextZoneId]) continue;
          const nextRoute = [...route, nextZoneId];
          if (nextZoneId === toZoneId) return nextRoute;
          seen.add(nextZoneId);
          queue.push(nextRoute);
        }
      }
      return null;
    }

    function canRouteToZone(zoneId) {
      if (zoneId === currentZoneId) return false;
      return Boolean(findZoneRoute(currentZoneId, zoneId));
    }

    function clearZoneRoute() {
      zoneRouteQueue = [];
      zoneRouteTargetId = "";
      document.documentElement.dataset.shelterZoneRoute = "";
    }

    function continueZoneRoute() {
      if (zoneTransitionState || !zoneRouteQueue.length) return;
      const nextZoneId = zoneRouteQueue.shift();
      beginZoneTransition(nextZoneId, { preserveRoute: true });
    }

    function beginZoneRoute(targetZoneId) {
      if (zoneTransitionState || targetZoneId === currentZoneId) return false;
      const route = findZoneRoute(currentZoneId, targetZoneId);
      if (!route || route.length < 2) return false;
      zoneRouteQueue = route.slice(2);
      zoneRouteTargetId = targetZoneId;
      document.documentElement.dataset.shelterZoneRoute = route.join(">");
      return beginZoneTransition(route[1], { preserveRoute: true });
    }

    function directionVectorForKey(key) {
      const keyId = key.length === 1 ? key.toLowerCase() : key.toLowerCase();
      if (keyId === "w" || keyId === "arrowup") return { x: 0, y: -1 };
      if (keyId === "s" || keyId === "arrowdown") return { x: 0, y: 1 };
      if (keyId === "a" || keyId === "arrowleft") return { x: -1, y: 0 };
      if (keyId === "d" || keyId === "arrowright") return { x: 1, y: 0 };
      return null;
    }

    function adjacentZoneTowardKey(key) {
      const direction = directionVectorForKey(key);
      if (!direction) return null;

      const currentZone = zoneById(currentZoneId);
      const currentCenter = zoneCenter(currentZone);
      let best = null;
      for (const adjacentId of currentZone.adjacent) {
        const adjacentZone = zoneById(adjacentId);
        const adjacentCenter = zoneCenter(adjacentZone);
        const dx = adjacentCenter.x - currentCenter.x;
        const dy = adjacentCenter.y - currentCenter.y;
        const distance = Math.hypot(dx, dy) || 1;
        const score = (dx / distance) * direction.x + (dy / distance) * direction.y;
        if (!best || score > best.score) {
          best = { zoneId: adjacentZone.id, score };
        }
      }
      return best && best.score > 0.22 ? best.zoneId : null;
    }

    function finishZoneTransition(nextZoneId) {
      currentZoneId = nextZoneId;
      setActiveZoneSurface(zoneById(currentZoneId));
      resetZoneTransitionSurface();
      zoneTransitionState = null;
      document.documentElement.dataset.shelterZoneTransition = "";
      updateZoneUi();
      if (zoneRouteQueue.length) {
        window.setTimeout(continueZoneRoute, 90);
      } else if (zoneRouteTargetId === currentZoneId) {
        clearZoneRoute();
      }
    }

    function beginZoneTransition(nextZoneId, options = {}) {
      if (zoneTransitionState || nextZoneId === currentZoneId) return false;
      if (!options.preserveRoute) clearZoneRoute();
      const fromZone = zoneById(currentZoneId);
      const toZone = zoneById(nextZoneId);
      const startedAt = performance.now();
      zoneTransitionState = { from: fromZone.id, to: toZone.id, startedAt };
      document.documentElement.dataset.shelterZoneTransition = `${fromZone.id}>${toZone.id}`;
      setTransitionZoneSurface(toZone);
      const lookPoint = ZONE_LOOK_POINTS[toZone.id] || ZONE_LOOK_POINTS.living;
      setDroneLook(lookPoint.x, lookPoint.y, "zone-transition");

      const tick = (time) => {
        if (!zoneTransitionState) return;
        const eased = easeInOutCubic((time - startedAt) / ZONE_TRANSITION.durationMs);
        setZoneTransitionProgress(eased);
        if (eased >= 1) {
          finishZoneTransition(toZone.id);
          return;
        }
        zoneTransitionFrameId = requestAnimationFrame(tick);
      };

      cancelAnimationFrame(zoneTransitionFrameId);
      zoneTransitionFrameId = requestAnimationFrame(tick);
      return true;
    }

    function moveZoneForKey(key) {
      const nextZoneId = adjacentZoneTowardKey(key);
      if (!nextZoneId) return false;
      if (zoneTransitionState) return true;
      return beginZoneTransition(nextZoneId);
    }

    function activateCurrentZone() {
      const zone = zoneById(currentZoneId);
      if (zone.id === "living") {
        activateHotspot();
        return true;
      }
      if (!zone.action) return false;
      window.SHELTER_HANDLERS[zone.action]?.();
      return true;
    }

    class ShelterAudio {
      constructor() {
        this.context = null;
        this.master = null;
        this.bgm = shelterBgmAudio;
        this.isMuted = false;
        this.childTimer = 0;
        if (this.bgm) {
          this.bgm.volume = 0.42;
          this.bgm.muted = false;
        }
        document.documentElement.dataset.shelterAudioStarted = "false";
        document.documentElement.dataset.shelterAudioMuted = "false";
        document.documentElement.dataset.shelterBgm = "assets/audio/rain-on-glass.mp3";
      }

      ensureStarted() {
        this.startBgm();

        if (this.context) {
          this.context.resume();
          return;
        }

        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        if (!AudioContextClass) return;

        this.context = new AudioContextClass();
        this.master = this.context.createGain();
        this.master.gain.value = this.isMuted ? 0 : 0.58;
        this.master.connect(this.context.destination);
        document.documentElement.dataset.shelterAudioStarted = "true";

        this.createRainBed();
        this.createWaterBed();
        this.createBulbHum();
        this.scheduleChildMovement();
      }

      startBgm() {
        if (!this.bgm) return;
        this.bgm.muted = this.isMuted;
        this.bgm.volume = this.isMuted ? 0 : 0.42;
        const playPromise = this.bgm.play();
        if (playPromise && typeof playPromise.catch === "function") {
          playPromise
            .then(() => {
              window.__lastShelterBgmPlayError = "";
              document.documentElement.dataset.shelterBgmPlaying = this.isMuted ? "muted" : "true";
            })
            .catch((error) => {
              window.__lastShelterBgmPlayError = error ? `${error.name}: ${error.message}` : "audio play rejected";
              document.documentElement.dataset.shelterBgmPlaying = "blocked";
            });
        }
      }

      createNoiseBuffer(seconds = 2) {
        const sampleRate = this.context.sampleRate;
        const buffer = this.context.createBuffer(1, sampleRate * seconds, sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < data.length; i += 1) {
          data[i] = Math.random() * 2 - 1;
        }
        return buffer;
      }

      createLoopedNoise({ filterType, frequency, gainValue, panValue }) {
        const source = this.context.createBufferSource();
        source.buffer = this.createNoiseBuffer();
        source.loop = true;

        const filter = this.context.createBiquadFilter();
        filter.type = filterType;
        filter.frequency.value = frequency;
        filter.Q.value = 0.6;

        const gain = this.context.createGain();
        gain.gain.value = gainValue;

        const pan = this.context.createStereoPanner ? this.context.createStereoPanner() : null;
        if (pan) pan.pan.value = panValue;

        source.connect(filter);
        filter.connect(gain);
        if (pan) {
          gain.connect(pan);
          pan.connect(this.master);
        } else {
          gain.connect(this.master);
        }
        source.start();
      }

      createRainBed() {
        this.createLoopedNoise({
          filterType: "bandpass",
          frequency: 1180,
          gainValue: 0.026,
          panValue: -0.18
        });
      }

      createWaterBed() {
        this.createLoopedNoise({
          filterType: "lowpass",
          frequency: 420,
          gainValue: 0.032,
          panValue: 0.42
        });
      }

      createBulbHum() {
        const osc = this.context.createOscillator();
        const gain = this.context.createGain();
        const pan = this.context.createStereoPanner ? this.context.createStereoPanner() : null;
        osc.type = "sine";
        osc.frequency.value = 93;
        gain.gain.value = 0.012;
        if (pan) pan.pan.value = -0.08;
        osc.connect(gain);
        if (pan) {
          gain.connect(pan);
          pan.connect(this.master);
        } else {
          gain.connect(this.master);
        }
        osc.start();
      }

      playChildMovement() {
        if (!this.context || this.isMuted) return;
        const now = this.context.currentTime;
        const osc = this.context.createOscillator();
        const gain = this.context.createGain();
        const pan = this.context.createStereoPanner ? this.context.createStereoPanner() : null;
        const point = childPoint();
        osc.type = "triangle";
        osc.frequency.setValueAtTime(220 + Math.random() * 80, now);
        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.exponentialRampToValueAtTime(0.012, now + 0.025);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.16);
        if (pan) pan.pan.value = clamp((point.x - 0.5) * 1.4, -0.75, 0.75);
        osc.connect(gain);
        if (pan) {
          gain.connect(pan);
          pan.connect(this.master);
        } else {
          gain.connect(this.master);
        }
        osc.start(now);
        osc.stop(now + 0.18);
      }

      scheduleChildMovement() {
        window.clearTimeout(this.childTimer);
        this.childTimer = window.setTimeout(() => {
          this.playChildMovement();
          this.scheduleChildMovement();
        }, 6200 + Math.random() * 6800);
      }

      setMuted(nextMuted) {
        this.isMuted = Boolean(nextMuted);
        this.ensureStarted();
        if (this.bgm) {
          this.bgm.muted = this.isMuted;
          this.bgm.volume = this.isMuted ? 0 : 0.42;
          document.documentElement.dataset.shelterBgmPlaying = this.isMuted ? "muted" : "true";
        }
        document.documentElement.dataset.shelterAudioMuted = String(this.isMuted);
        shelterAudioToggle.textContent = this.isMuted ? "소리 꺼짐" : "소리 켜짐";
        if (!this.master || !this.context) return;
        const now = this.context.currentTime;
        this.master.gain.cancelScheduledValues(now);
        this.master.gain.setTargetAtTime(this.isMuted ? 0 : 0.58, now, 0.18);
      }

      toggle() {
        this.setMuted(!this.isMuted);
      }
    }

    const shelterAudio = new ShelterAudio();

    function normalizeSave(state) {
      const sanity = clamp(Math.floor(Number(state?.sanity ?? 100) || 0), 0, 100);
      const deaths = Math.max(0, Math.floor(Number(state?.deaths) || 0));
      const cycle = Math.max(1, Math.floor(Number(state?.cycle ?? state?.day ?? deaths + 1) || 1));
      return {
        ...DEFAULT_SAVE,
        ...state,
        deaths,
        sanity,
        cycle,
        day: Math.max(1, Math.floor(Number(state?.day ?? cycle) || cycle)),
        exists: Boolean(state?.exists)
      };
    }

    function loadSave() {
      try {
        const raw = localStorage.getItem(SAVE_KEY);
        return raw ? JSON.parse(raw) : null;
      } catch {
        return null;
      }
    }

    function saveGame(state) {
      const next = normalizeSave({
        ...DEFAULT_SAVE,
        ...state,
        exists: true
      });
      try {
        localStorage.setItem(SAVE_KEY, JSON.stringify(next));
      } catch (error) {
        console.warn("shelter save failed before expedition", error);
      }
      saveState = next;
      syncSaveDrivenVisuals();
      return next;
    }

    function normalizePartInstance(partLike) {
      const id = typeof partLike === "string" ? partLike : String(partLike?.id || "");
      const definition = PART_DEFINITIONS[id] || (partLike && typeof partLike === "object" ? partLike : null);
      if (!definition?.id) {
        return null;
      }
      const source = partLike && typeof partLike === "object" ? partLike : {};
      return {
        ...clonePlain(definition, {}),
        ...clonePlain(source, {}),
        id: definition.id,
        name: definition.name || source.name || definition.id,
        slot: definition.slot || source.slot || "core",
        statModifiers: {
          ...(definition.statModifiers || {}),
          ...(source.statModifiers || {})
        },
        memoryResidue: Number(source.memoryResidue ?? definition.memoryResidue ?? definition.corruption ?? 0),
        corruption: Number(source.corruption ?? definition.corruption ?? definition.memoryResidue ?? 0),
        purified: Boolean(source.purified ?? definition.purified)
      };
    }

    function normalizeMeta(raw) {
      const parsed = raw && typeof raw === "object" ? raw : {};
      return {
        ...clonePlain(DEFAULT_META, {}),
        ...clonePlain(parsed, {}),
        securedLoot: Array.isArray(parsed.securedLoot) ? parsed.securedLoot.filter(Boolean) : [],
        upgrades: parsed.upgrades && typeof parsed.upgrades === "object" ? parsed.upgrades : {},
        unlockedAbilities: Array.isArray(parsed.unlockedAbilities) ? parsed.unlockedAbilities.map(String) : [],
        storyFlags: Array.isArray(parsed.storyFlags) ? parsed.storyFlags.map(String) : [],
        partInventory: Array.isArray(parsed.partInventory)
          ? parsed.partInventory.map(normalizePartInstance).filter(Boolean)
          : [],
        attachedParts: Array.isArray(parsed.attachedParts)
          ? parsed.attachedParts.map(normalizePartInstance).filter(Boolean)
          : [],
        seenDreamIds: Array.isArray(parsed.seenDreamIds) ? parsed.seenDreamIds.map(String) : [],
        cgArchive: parsed.cgArchive && typeof parsed.cgArchive === "object"
          ? parsed.cgArchive
          : clonePlain(DEFAULT_META.cgArchive, {}),
        completedRuns: Number.isFinite(parsed.completedRuns) ? parsed.completedRuns : 0
      };
    }

    function loadMetaState() {
      try {
        const raw = localStorage.getItem(META_SAVE_KEY);
        return normalizeMeta(raw ? JSON.parse(raw) : null);
      } catch {
        return normalizeMeta(null);
      }
    }

    function syncWorkshopMetaDataset(meta) {
      document.documentElement.dataset.shelterPartInventory = String(meta.partInventory.length);
      document.documentElement.dataset.shelterAttachedParts = String(meta.attachedParts.length);
    }

    function saveMetaState(meta) {
      const next = normalizeMeta(meta);
      try {
        localStorage.setItem(META_SAVE_KEY, JSON.stringify(next));
      } catch (error) {
        console.warn("shelter meta save failed", error);
      }
      syncWorkshopMetaDataset(next);
      return next;
    }

    function resetMetaFromUrl() {
      if (!isUrlFlagEnabled("resetMeta") && !isUrlFlagEnabled("resetShelter")) {
        return false;
      }
      try {
        localStorage.removeItem(META_SAVE_KEY);
      } catch (error) {
        console.warn("shelter meta reset failed", error);
      }
      document.documentElement.dataset.shelterMetaReset = "true";
      return true;
    }

    function createShelterDialogueState() {
      return {
        active: false,
        mode: "idle",
        event: null,
        node: null,
        lineSegments: [],
        lineIndex: 0,
        choices: [],
        choiceIndex: 0,
        emotion: "neutral",
        artAssetKey: "",
        resultLines: [],
        afterLine: "",
        requestId: 0,
        topicIndex: 0,
        lineStartedAt: 0,
        lineForcedComplete: false,
        typingSound: null,
        transition: null,
        bridgeEvent: null,
        bridgeDurationMs: 0,
        closing: false
      };
    }

    function normalizeShelterTalkEmotion(emotion, fallback = "neutral") {
      return SHELTER_TALK_EMOTIONS.has(emotion) ? emotion : fallback;
    }

    function normalizeShelterArtAssetKey(assetKey = "") {
      return typeof assetKey === "string" ? assetKey.trim() : "";
    }

    function getShelterScriptedEvents() {
      return Array.isArray(GAME_DATA.shelter?.events)
        ? GAME_DATA.shelter.events.filter((event) => event && typeof event === "object" && typeof event.id === "string")
        : [];
    }

    function getShelterScriptedEvent(eventId) {
      return getShelterScriptedEvents().find((event) => event.id === eventId) || null;
    }

    function getShelterScriptedEventNode(event, nodeId = "") {
      const nodes = Array.isArray(event?.nodes) ? event.nodes : [];
      const targetId = nodeId || event?.startNodeId || nodes[0]?.id || "";
      return nodes.find((node) => node && typeof node === "object" && node.id === targetId) || nodes[0] || null;
    }

    function getShelterEventCompletionFlag(event) {
      return event?.completionFlag || (event?.id ? `shelter-event:${event.id}` : "");
    }

    function getShelterEventBridgeConfig(event) {
      const transition = event?.transition && typeof event.transition === "object" ? event.transition : {};
      const node = getShelterScriptedEventNode(event, event?.startNodeId);
      const line = String(transition.line || event?.transitionLine || event?.bridgeLine || "").trim();
      const rawDuration = Number(transition.seconds ?? event?.transitionSeconds ?? event?.bridgeSeconds);
      const durationMs = Number.isFinite(rawDuration)
        ? clamp(rawDuration, 0.45, 3) * 1000
        : SHELTER_EVENT_BRIDGE_MS;
      return {
        line,
        durationMs,
        emotion: normalizeShelterTalkEmotion(
          transition.emotion || event?.transitionEmotion,
          normalizeShelterTalkEmotion(node?.emotion, normalizeShelterTalkEmotion(event?.emotion, "neutral"))
        ),
        artAssetKey: normalizeShelterArtAssetKey(transition.backgroundAssetKey)
          || normalizeShelterArtAssetKey(transition.artAssetKey)
          || normalizeShelterArtAssetKey(event?.transitionAssetKey)
          || getShelterEventStartArtAssetKey(event, node)
      };
    }

    function hasMetaStoryFlag(meta, flag) {
      return Boolean(flag && Array.isArray(meta?.storyFlags) && meta.storyFlags.includes(flag));
    }

    function addMetaStoryFlag(meta, flag) {
      if (!flag) return false;
      meta.storyFlags = Array.isArray(meta.storyFlags) ? meta.storyFlags : [];
      if (meta.storyFlags.includes(flag)) return false;
      meta.storyFlags.push(flag);
      return true;
    }

    function canStartShelterScriptedEvent(meta, event, options = {}) {
      if (!event?.id) return false;
      const trigger = event.trigger && typeof event.trigger === "object" ? event.trigger : {};
      if (options.autoOnly && trigger.autoStart !== true) return false;
      const completionFlag = getShelterEventCompletionFlag(event);
      if (event.once !== false && hasMetaStoryFlag(meta, completionFlag)) return false;
      if (trigger.requiredStoryFlag && !hasMetaStoryFlag(meta, trigger.requiredStoryFlag)) return false;
      if (trigger.missingStoryFlag && hasMetaStoryFlag(meta, trigger.missingStoryFlag)) return false;
      return true;
    }

    function getNextShelterScriptedEvent(meta, options = {}) {
      return getShelterScriptedEvents().find((event) => canStartShelterScriptedEvent(meta, event, options)) || null;
    }

    function getShelterEventStartArtAssetKey(event, node = null) {
      return normalizeShelterArtAssetKey(node?.backgroundAssetKey)
        || normalizeShelterArtAssetKey(node?.artAssetKey)
        || normalizeShelterArtAssetKey(event?.backgroundAssetKey)
        || normalizeShelterArtAssetKey(event?.artAssetKey);
    }

    function getShelterDialogueArtAssetKey(emotion, fallbackAssetKey = "") {
      const fallback = normalizeShelterArtAssetKey(fallbackAssetKey);
      if (fallback && !SHELTER_HOME_BASE_ART_ASSET_KEYS.has(fallback)) {
        return fallback;
      }
      return normalizeShelterArtAssetKey(SHELTER_HOME_EMOTION_ART_ASSETS[normalizeShelterTalkEmotion(emotion, "neutral")])
        || fallback;
    }

    function getShelterDialogueSegments(text = "") {
      return String(text || "")
        .split(/\n+/)
        .map((line) => line.trim())
        .filter(Boolean);
    }

    function resolveShelterArtSrc(assetKey = "") {
      const source = GAME_DATA.art?.[assetKey]?.src;
      return typeof source === "string" ? source : "";
    }

    function normalizeShelterEventChoice(choice, event) {
      if (!choice || typeof choice !== "object") return null;
      const label = String(choice.label || "").trim();
      if (!label) return null;
      return {
        ...choice,
        label,
        intent: String(choice.intent || event?.title || event?.id || "scripted shelter event"),
        reply: String(choice.reply || "").trim(),
        emotion: normalizeShelterTalkEmotion(choice.emotion, normalizeShelterTalkEmotion(event?.emotion, "neutral")),
        eventId: event?.id || ""
      };
    }

    function getShelterNodeChoices(event, node) {
      return Array.isArray(node?.choices)
        ? node.choices.map((choice) => normalizeShelterEventChoice(choice, event)).filter(Boolean).slice(0, 3)
        : [];
    }

    function getShelterGenericChoices() {
      const total = SHELTER_DIALOGUE_GENERIC_CHOICES.length;
      const start = (Math.floor(shelterDialogueState.topicIndex || 0) + Math.floor(shelterDialogueState.requestId || 0)) % total;
      return [0, 1, 2].map((offset) => SHELTER_DIALOGUE_GENERIC_CHOICES[(start + offset) % total]);
    }

    function setShelterDialogueLine(text) {
      shelterDialogueState.lineSegments = getShelterDialogueSegments(text);
      if (!shelterDialogueState.lineSegments.length) {
        shelterDialogueState.lineSegments = ["......"];
      }
      shelterDialogueState.lineIndex = 0;
      markShelterDialogueLineStarted();
    }

    function getShelterCurrentDialogueLine() {
      const lines = shelterDialogueState.lineSegments;
      const index = clamp(Math.floor(shelterDialogueState.lineIndex || 0), 0, Math.max(0, lines.length - 1));
      return lines[index] || "";
    }

    function getAudioClockSeconds() {
      return performance.now() / 1000;
    }

    function getShelterTypingSoundPreset(emotion) {
      return SHELTER_TYPING_SOUND_PRESETS[normalizeShelterTalkEmotion(emotion, "neutral")]
        || SHELTER_TYPING_SOUND_PRESETS.neutral;
    }

    function shouldSkipShelterTypingChar(char) {
      return !String(char || "").trim();
    }

    function isShelterTypingPunctuation(char) {
      return /[.!?。！？…]$/u.test(String(char || ""));
    }

    function createShelterTypingNoiseBuffer(context, duration) {
      const sampleCount = Math.max(1, Math.floor(context.sampleRate * duration));
      const buffer = context.createBuffer(1, sampleCount, context.sampleRate);
      const channel = buffer.getChannelData(0);
      for (let index = 0; index < sampleCount; index += 1) {
        const decay = 1 - index / sampleCount;
        channel[index] = (Math.random() * 2 - 1) * decay * decay;
      }
      return buffer;
    }

    function playShelterTypingSound(emotion, char, visibleCount = 0) {
      if (shouldSkipShelterTypingChar(char)) return;
      try {
        const context = shelterAudio.context;
        if (!context || !shelterAudio.master || shelterAudio.isMuted) return;
        context.resume?.();
        const preset = getShelterTypingSoundPreset(emotion);
        const punctuation = isShelterTypingPunctuation(char);
        const seed = ((String(char).codePointAt(0) || 0) + visibleCount * 17) % 7;
        const volume = preset.volume * SHELTER_TYPING_SOUND_GAIN * (punctuation ? 0.82 : 1);
        if (volume <= 0.0001) return;
        document.documentElement.dataset.shelterLastTypingSound = `${emotion}:${visibleCount}:${char}`;
        const now = context.currentTime;
        const toneDuration = preset.duration * (punctuation ? 1.28 : 1);
        const oscillator = context.createOscillator();
        const toneFilter = context.createBiquadFilter();
        const toneGain = context.createGain();
        oscillator.type = preset.tone;
        oscillator.frequency.setValueAtTime(
          (punctuation ? preset.base * 0.78 : preset.base) + seed * preset.step,
          now
        );
        toneFilter.type = "bandpass";
        toneFilter.frequency.setValueAtTime(preset.filter, now);
        toneFilter.Q.setValueAtTime(punctuation ? 2.4 : 3.2, now);
        toneGain.gain.setValueAtTime(0.0001, now);
        toneGain.gain.exponentialRampToValueAtTime(Math.max(0.0001, volume), now + 0.004);
        toneGain.gain.exponentialRampToValueAtTime(0.0001, now + toneDuration);
        oscillator.connect(toneFilter);
        toneFilter.connect(toneGain);
        toneGain.connect(shelterAudio.master);
        oscillator.start(now);
        oscillator.stop(now + toneDuration + 0.012);

        const noiseDuration = Math.min(0.018, toneDuration);
        const noise = context.createBufferSource();
        const noiseFilter = context.createBiquadFilter();
        const noiseGain = context.createGain();
        noise.buffer = createShelterTypingNoiseBuffer(context, noiseDuration);
        noiseFilter.type = "highpass";
        noiseFilter.frequency.setValueAtTime(punctuation ? 720 : 1100, now);
        noiseGain.gain.setValueAtTime(0.0001, now);
        noiseGain.gain.exponentialRampToValueAtTime(Math.max(0.0001, volume * 0.72), now + 0.003);
        noiseGain.gain.exponentialRampToValueAtTime(0.0001, now + noiseDuration);
        noise.connect(noiseFilter);
        noiseFilter.connect(noiseGain);
        noiseGain.connect(shelterAudio.master);
        noise.start(now);
        noise.stop(now + noiseDuration + 0.004);
      } catch {
        // Browser audio can be blocked until a user gesture; dialogue still works.
      }
    }

    function getShelterVisibleTypedCharacterCount(line, progress) {
      const letters = Array.from(String(line || ""));
      if (!letters.length) return 0;
      return clamp(Math.ceil(letters.length * progress), 1, letters.length);
    }

    function updateShelterTypingSoundForLine(host, line, progress, emotion, lineKey) {
      if (!host || typeof line !== "string" || !line) return;
      const letters = Array.from(line);
      const visibleCount = getShelterVisibleTypedCharacterCount(line, progress);
      host.typingSound = host.typingSound && typeof host.typingSound === "object" ? host.typingSound : {};
      if (host.typingSound.lineKey !== lineKey) {
        host.typingSound = {
          lineKey,
          visibleCount: 0,
          lastPlayedAt: 0
        };
      }
      const previousCount = clamp(Math.floor(host.typingSound.visibleCount || 0), 0, letters.length);
      if (visibleCount <= previousCount) {
        host.typingSound.visibleCount = visibleCount;
        return;
      }
      const delta = visibleCount - previousCount;
      host.typingSound.visibleCount = visibleCount;
      if (delta > SHELTER_TYPING_SOUND_MAX_CATCHUP) return;
      const newLetters = letters.slice(previousCount, visibleCount);
      const audibleChar = [...newLetters].reverse().find((char) => !shouldSkipShelterTypingChar(char));
      if (!audibleChar) return;
      const now = getAudioClockSeconds();
      const preset = getShelterTypingSoundPreset(emotion);
      const minInterval = Number.isFinite(preset.interval)
        ? preset.interval
        : SHELTER_TYPING_SOUND_DEFAULT_INTERVAL;
      if (now - Number(host.typingSound.lastPlayedAt || 0) < minInterval) return;
      host.typingSound.lastPlayedAt = now;
      playShelterTypingSound(emotion, audibleChar, visibleCount);
    }

    function markShelterDialogueLineStarted() {
      shelterDialogueState.lineStartedAt = performance.now();
      shelterDialogueState.lineForcedComplete = false;
      shelterDialogueState.typingSound = null;
      scheduleShelterDialogueFrame();
    }

    function getShelterDialogueTypeDuration(line) {
      const length = Array.from(String(line || "").trim()).length;
      if (!length) return 0;
      return clamp(
        length / getShelterSubtitleCharsPerSecond() * 1000,
        SHELTER_DIALOGUE_TYPE_MIN_MS,
        SHELTER_DIALOGUE_TYPE_MAX_MS
      );
    }

    function getShelterDialogueTypeProgress() {
      if (shelterDialogueState.lineForcedComplete) return 1;
      const duration = getShelterDialogueTypeDuration(getShelterCurrentDialogueLine());
      if (duration <= 0) return 1;
      return clamp(getShelterDialogueLineAge() / duration, 0, 1);
    }

    function getShelterDialogueLineAge() {
      return Math.max(0, performance.now() - (Number.isFinite(shelterDialogueState.lineStartedAt) ? shelterDialogueState.lineStartedAt : 0));
    }

    function isShelterDialogueLineTypedComplete() {
      if (shelterDialogueState.lineForcedComplete) return true;
      const duration = getShelterDialogueTypeDuration(getShelterCurrentDialogueLine());
      return duration <= 0 || getShelterDialogueLineAge() >= duration;
    }

    function getVisibleShelterDialogueLine() {
      const line = getShelterCurrentDialogueLine();
      if (!line || shelterDialogueState.lineForcedComplete) return line;
      const letters = Array.from(line);
      const progress = getShelterDialogueTypeProgress();
      const visibleCount = clamp(Math.ceil(letters.length * progress), 1, letters.length);
      return letters.slice(0, visibleCount).join("");
    }

    function canRevealShelterDialogueChoices() {
      return Boolean(
        shelterDialogueState.active
        && shelterDialogueState.mode !== "result"
        && shelterDialogueState.mode !== "bridge"
        && shelterDialogueState.afterLine !== "event-result"
        && shelterDialogueState.choices.length
        && shelterDialogueState.lineIndex >= Math.max(0, shelterDialogueState.lineSegments.length - 1)
        && isShelterDialogueLineTypedComplete()
        && getShelterDialogueLineAge() >= getShelterDialogueTypeDuration(getShelterCurrentDialogueLine()) + SHELTER_DIALOGUE_CHOICE_REVEAL_MS
      );
    }

    function easeShelterDoorTransition(value) {
      const t = clamp(value, 0, 1);
      return t * t * (3 - 2 * t);
    }

    function beginShelterDialogueTransition(direction = "in") {
      shelterDialogueState.transition = {
        direction: direction === "out" ? "out" : "in",
        startedAt: performance.now(),
        duration: SHELTER_TALK_DOOR_TRANSITION_MS
      };
      scheduleShelterDialogueFrame();
    }

    function getShelterDialogueTransitionProgress() {
      const transition = shelterDialogueState.transition;
      if (!transition || typeof transition !== "object") return null;
      const duration = Number.isFinite(transition.duration) ? Math.max(200, transition.duration) : SHELTER_TALK_DOOR_TRANSITION_MS;
      const progress = clamp((performance.now() - Number(transition.startedAt || 0)) / duration, 0, 1);
      return {
        direction: transition.direction === "out" ? "out" : "in",
        progress,
        complete: progress >= 1
      };
    }

    function updateShelterDoorTransitionVisual() {
      const transition = getShelterDialogueTransitionProgress();
      if (!transition) {
        shelterDialogueOverlay.style.setProperty("--shelter-door-cover", "0");
        shelterDialogueOverlay.style.setProperty("--shelter-door-fade", "0");
        shelterDialogueOverlay.style.setProperty("--shelter-door-frame", "0");
        shelterDialogueOverlay.style.setProperty("--shelter-door-center", "0");
        document.documentElement.dataset.shelterDoorTransition = "";
        return false;
      }
      const eased = easeShelterDoorTransition(transition.progress);
      const fadeAlpha = transition.direction === "out" ? eased : 1 - eased;
      shelterDialogueOverlay.style.setProperty("--shelter-door-cover", "0");
      shelterDialogueOverlay.style.setProperty("--shelter-door-fade", fadeAlpha.toFixed(3));
      shelterDialogueOverlay.style.setProperty("--shelter-door-frame", "0");
      shelterDialogueOverlay.style.setProperty("--shelter-door-center", "0");
      document.documentElement.dataset.shelterDoorTransition = `${transition.direction}:fade:${fadeAlpha.toFixed(3)}`;
      if (!transition.complete) return true;
      if (transition.direction === "out") {
        finalizeShelterDialogueClose();
        return false;
      }
      shelterDialogueState.transition = null;
      updateShelterDoorTransitionVisual();
      return false;
    }

    function getShelterBridgeDurationMs() {
      if (shelterDialogueState.mode !== "bridge") return 0;
      return Math.max(
        Number.isFinite(shelterDialogueState.bridgeDurationMs) ? shelterDialogueState.bridgeDurationMs : SHELTER_EVENT_BRIDGE_MS,
        getShelterDialogueTypeDuration(getShelterCurrentDialogueLine()) + 200
      );
    }

    function getShelterBridgeAgeMs() {
      return Math.max(0, performance.now() - (Number.isFinite(shelterDialogueState.lineStartedAt) ? shelterDialogueState.lineStartedAt : 0));
    }

    function isShelterBridgeComplete() {
      return shelterDialogueState.mode === "bridge" && getShelterBridgeAgeMs() >= getShelterBridgeDurationMs();
    }

    function getShelterBridgeAlpha() {
      if (shelterDialogueState.mode !== "bridge") return 1;
      const duration = getShelterBridgeDurationMs();
      if (duration <= 0) return 1;
      const age = getShelterBridgeAgeMs();
      const fadeIn = clamp(age / 280, 0, 1);
      const fadeOut = clamp((duration - age) / 220, 0, 1);
      return Math.min(fadeIn, fadeOut);
    }

    function updateShelterBridgeVisual() {
      const alpha = getShelterBridgeAlpha();
      shelterDialogueOverlay.style.setProperty("--shelter-dialogue-alpha", alpha.toFixed(3));
      shelterDialogueOverlay.classList.toggle("is-bridge", shelterDialogueState.mode === "bridge");
      document.documentElement.dataset.shelterDialogueAlpha = alpha.toFixed(3);
    }

    function finishShelterBridge() {
      const event = shelterDialogueState.bridgeEvent;
      if (event) {
        startShelterScriptedDialogue(event);
      } else {
        closeShelterDialogue(true);
      }
    }

    function scheduleShelterDialogueFrame() {
      if (!shelterDialogueState.active || shelterDialogueFrameId) return;
      shelterDialogueFrameId = window.requestAnimationFrame(() => {
        shelterDialogueFrameId = 0;
        if (!shelterDialogueState.active) return;
        if (isShelterBridgeComplete()) {
          finishShelterBridge();
          return;
        }
        renderShelterDialogue();
        if (shelterDialogueState.transition) {
          scheduleShelterDialogueFrame();
        } else if (shelterDialogueState.mode === "bridge" && !isShelterBridgeComplete()) {
          scheduleShelterDialogueFrame();
        } else if (!isShelterDialogueLineTypedComplete()) {
          scheduleShelterDialogueFrame();
        } else if (
          shelterDialogueState.choices.length
          && shelterDialogueState.afterLine !== "event-result"
          && getShelterDialogueLineAge() < getShelterDialogueTypeDuration(getShelterCurrentDialogueLine()) + SHELTER_DIALOGUE_CHOICE_REVEAL_MS
        ) {
          scheduleShelterDialogueFrame();
        }
      });
    }

    function setShelterDialogueArt(assetKey = "") {
      shelterDialogueState.artAssetKey = normalizeShelterArtAssetKey(assetKey);
    }

    function renderShelterDialogue() {
      const active = Boolean(shelterDialogueState.active);
      shelterDialogueOverlay.classList.toggle("is-open", active);
      shelterDialogueOverlay.setAttribute("aria-hidden", active ? "false" : "true");
      document.body.classList.toggle("is-shelter-dialogue-active", active);
      if (active) {
        updateShelterDoorTransitionVisual();
      } else {
        updateShelterDoorTransitionVisual();
      }
      if (!shelterDialogueState.active) {
        shelterDialogueOverlay.classList.remove("is-open");
        shelterDialogueOverlay.classList.remove("is-bridge");
        shelterDialogueOverlay.setAttribute("aria-hidden", "true");
        document.body.classList.remove("is-shelter-dialogue-active");
        document.documentElement.dataset.activeShelterDialogue = "";
        document.documentElement.dataset.shelterDialogueAlpha = "";
        childActor.dataset.emotion = "";
        return;
      }
      const choicesVisible = canRevealShelterDialogueChoices();
      updateShelterBridgeVisual();
      document.documentElement.dataset.activeShelterDialogue = active
        ? (choicesVisible ? "choices" : shelterDialogueState.mode)
        : "";
      childActor.dataset.emotion = active ? shelterDialogueState.emotion : "";
      if (!active) {
        return;
      }

      shelterDialogueSpeaker.textContent = shelterDialogueState.event?.title || "TYPE-07A";
      const currentLine = getShelterCurrentDialogueLine();
      const typeProgress = getShelterDialogueTypeProgress();
      const lineKey = [
        shelterDialogueState.mode,
        shelterDialogueState.event?.id || shelterDialogueState.bridgeEvent?.id || "free",
        shelterDialogueState.node?.id || "",
        shelterDialogueState.lineIndex || 0,
        shelterDialogueState.emotion || "neutral",
        currentLine
      ].join("|");
      updateShelterTypingSoundForLine(
        shelterDialogueState,
        currentLine,
        typeProgress,
        shelterDialogueState.emotion,
        lineKey
      );
      shelterDialogueLine.textContent = getVisibleShelterDialogueLine();
      const showResult = shelterDialogueState.mode === "result" && shelterDialogueState.resultLines.length > 0;
      shelterDialogueResult.classList.toggle("is-visible", showResult);
      shelterDialogueResult.innerHTML = showResult ? shelterDialogueState.resultLines
        .map((line) => `<div>${escapeHtml(line)}</div>`)
        .join("") : "";

      const artSrc = resolveShelterArtSrc(shelterDialogueState.artAssetKey);
      if (artSrc) {
        if (shelterDialogueArt.getAttribute("src") !== artSrc) {
          shelterDialogueArt.src = artSrc;
        }
        shelterDialogueArt.hidden = false;
      } else {
        shelterDialogueArt.hidden = true;
        shelterDialogueArt.removeAttribute("src");
      }

      shelterDialogueChoices.innerHTML = "";
      if ((shelterDialogueState.mode === "choices" || choicesVisible) && shelterDialogueState.choices.length) {
        shelterDialogueState.choices.forEach((choice, index) => {
          const button = document.createElement("button");
          button.type = "button";
          button.className = `shelter-dialogue-choice${index === shelterDialogueState.choiceIndex ? " is-selected" : ""}`;
          button.textContent = choice.label || "";
          button.addEventListener("click", () => selectShelterDialogueChoice(index));
          shelterDialogueChoices.appendChild(button);
        });
        shelterDialogueChoices.querySelector(".is-selected")?.focus({ preventScroll: true });
      }
    }

    function startShelterBridgeDialogue(event, bridge) {
      if (!event?.id || !bridge?.line) return false;
      shelterDialogueState = {
        ...createShelterDialogueState(),
        active: true,
        mode: "bridge",
        bridgeEvent: event,
        bridgeDurationMs: bridge.durationMs,
        choices: [],
        emotion: normalizeShelterTalkEmotion(bridge.emotion, "neutral")
      };
      setShelterDialogueArt(getShelterDialogueArtAssetKey(shelterDialogueState.emotion, bridge.artAssetKey));
      setShelterDialogueLine(bridge.line);
