<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>윤회무명2</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="./styles.css?v=20260424-recoil-45">
</head>
<body>
  <main class="app-shell">
    <div class="stage-shell">
      <nav class="app-links" aria-label="앱 이동">
        <a class="app-link is-current" href="./index.html">게임</a>
        <a class="app-link" href="./editor.html">레벨 에디터</a>
      </nav>

      <button id="liveEditButton" class="live-edit-button" type="button">라이브 편집</button>
      <button id="debugButton" class="debug-button" type="button">디버그</button>
      <button id="movementTuningButton" class="movement-tuning-button" type="button">이동 튜닝</button>

      <section id="movementTuningPanel" class="movement-tuning-panel" hidden>
        <div class="movement-tuning-header">
          <div>
            <p class="movement-tuning-eyebrow">Movement</p>
            <h2>이동 튜닝</h2>
          </div>
          <button id="movementTuningCloseButton" class="movement-tuning-close" type="button">닫기</button>
        </div>
        <p class="movement-tuning-note">값은 즉시 반영된다. 유지하려면 저장을 눌러라.</p>
        <div id="movementTuningFields" class="movement-tuning-grid"></div>
        <div class="movement-tuning-actions">
          <button id="movementTuningSaveButton" class="movement-tuning-action is-primary" type="button">값 저장</button>
          <button id="movementTuningResetButton" class="movement-tuning-action" type="button">기본값</button>
        </div>
      </section>

      <button id="sceneActionButton" class="scene-action-button" type="button">입장</button>

      <div id="touchControls" class="touch-controls" aria-label="브라우저 조작">
        <div class="touch-cluster touch-cluster--move">
          <button class="touch-button" data-code="ArrowLeft" type="button">←</button>
          <button class="touch-button touch-button--center" data-code="ArrowDown" type="button">↓</button>
          <button class="touch-button" data-code="ArrowRight" type="button">→</button>
        </div>
        <div class="touch-cluster touch-cluster--action">
          <button class="touch-button touch-button--action" data-code="KeyZ" type="button">사용</button>
          <button class="touch-button touch-button--action" data-code="KeyC" type="button">점프</button>
          <button class="touch-button touch-button--action" data-code="ShiftLeft" type="button">대시</button>
        </div>
      </div>

      <canvas id="gameCanvas" width="1280" height="720" aria-label="윤회무명2 게임 화면"></canvas>
    </div>
  </main>

  <script type="module" src="./main.js?v=20260424-recoil-45"></script>
</body>
</html>
