    function drawSkylinePlaceholder(width, height, waterY, alpha, time, buildings, style) {
      ctx.save();
      ctx.globalAlpha = alpha;

      for (const b of buildings) {
        const bw = width * b.w;
        const bh = height * b.h;
        const x = width * b.x;
        const buildingBaseY = layout.buildingBaseY + Math.sin(time * 0.0003 + b.x * 17) * 0.8;
        const y = buildingBaseY - bh;
        const shade = ctx.createLinearGradient(0, y, 0, buildingBaseY);
        shade.addColorStop(0, style.top);
        shade.addColorStop(1, style.bottom);
        ctx.fillStyle = shade;
        ctx.fillRect(x, y, bw, bh);

        ctx.fillStyle = "rgba(238, 240, 236, 0.045)";
        ctx.fillRect(x + bw * 0.16, y + 12, bw * 0.68, Math.max(1, bh * 0.012));
        ctx.fillRect(x + bw * 0.12, y + bh * 0.42, bw * 0.76, Math.max(1, bh * 0.01));
      }

      drawMistHaze(width, height, waterY, time, style.haze);
      ctx.restore();
    }

    function drawMistHaze(width, height, waterY, time, alphaScale) {
      ctx.save();
      ctx.lineWidth = 1;
      for (let i = 0; i < 7; i += 1) {
        const y = lerp(height * 0.34, Math.min(waterY - 28, height * 0.67), i / 6);
        const drift = Math.sin(time * 0.00025 + i * 1.7) * width * 0.015;
        const start = width * (0.04 + (i % 3) * 0.08) + drift;
        const end = width * (0.58 + (i % 4) * 0.11) + drift;
        ctx.globalAlpha = (0.07 + (i % 2) * 0.035) * alphaScale;
        ctx.strokeStyle = "rgba(241, 244, 239, 0.62)";
        ctx.beginPath();
        ctx.moveTo(start, y);
        ctx.lineTo(Math.min(width * 0.96, end), y + Math.sin(time * 0.0006 + i) * 1.2);
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawBrokenBridgeLayer(width, height, waterY, alpha) {
      // LAYER 04: broken bridge. Separate so final bridge art can slide in.
      // REPLACE: draw ART_HOOKS.brokenBridge image here.
      const y = Math.min(layout.bridgeY, waterY - 20);
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.strokeStyle = "rgba(89, 105, 111, 0.48)";
      ctx.lineWidth = Math.max(1, width * 0.002);
      ctx.beginPath();
      ctx.moveTo(width * 0.05, y + 10);
      ctx.lineTo(width * 0.27, y - 3);
      ctx.lineTo(width * 0.38, y + 2);
      ctx.moveTo(width * 0.48, y + 7);
      ctx.lineTo(width * 0.67, y - 8);
      ctx.moveTo(width * 0.76, y - 4);
      ctx.lineTo(width * 0.95, y + 6);
      ctx.stroke();

      ctx.strokeStyle = "rgba(89, 105, 111, 0.32)";
      ctx.lineWidth = 1;
      for (let i = 0; i < 9; i += 1) {
        const x = width * (0.09 + i * 0.095);
        if (i === 4 || i === 7) continue;
        ctx.beginPath();
        ctx.moveTo(x, y + 8);
        ctx.lineTo(x - 10, waterY + 26);
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawWaterLayer(width, height, waterY, alpha, time) {
      // LAYER 05: water. This is the death-driven samsara layer.
      // REPLACE: draw ART_HOOKS.water image/animation here, clipped from waterY down.
      ctx.save();
      ctx.globalAlpha = alpha;

      const water = ctx.createLinearGradient(0, waterY, 0, height);
      water.addColorStop(0, "#a9c0cb");
      water.addColorStop(1, "#7e9aa8");
      ctx.fillStyle = water;
      ctx.fillRect(0, waterY, width, height - waterY);

      ctx.strokeStyle = "rgba(241, 244, 239, 0.33)";
      ctx.lineWidth = 1;
      const lineCount = Math.floor(clamp(height / 38, 10, 24));
      for (let i = 0; i < lineCount; i += 1) {
        const y = waterY + 14 + i * ((height - waterY) / lineCount);
        const x0 = width * (0.08 + 0.02 * Math.sin(time * 0.0007 + i));
        const x1 = width * (0.28 + 0.58 * ((i % 5) / 5));
        ctx.globalAlpha = alpha * (0.11 + 0.08 * Math.sin(i * 1.7));
        ctx.beginPath();
        ctx.moveTo(x0, y);
        ctx.lineTo(x0 + x1, y + Math.sin(time * 0.001 + i) * 1.5);
        ctx.stroke();
      }

      ctx.globalAlpha = alpha * 0.35;
      ctx.strokeStyle = "rgba(236, 238, 234, 0.62)";
      ctx.beginPath();
      ctx.moveTo(0, waterY + 0.5);
      for (let x = 0; x <= width; x += 24) {
        const y = waterY + Math.sin(x * 0.012 + time * 0.001) * 1.2;
        ctx.lineTo(x, y);
      }
      ctx.stroke();

      ctx.restore();
    }

    function drawChildAndDroneLayer(waterY, deathT, alpha, time) {
      // LAYER 06: child + drone. Same world position; deathT decides visibility.
      // REPLACE: draw ART_HOOKS.childAndDrone sprite/sequence here.
      ctx.save();
      ctx.globalAlpha = alpha;

      if (deathT > 0.92) {
        drawDrone(layout.figureX + 18, waterY - 28, time);
        ctx.restore();
        return;
      }

      const x = layout.figureX;
      const footY = layout.figureFootY;
      const scale = clamp(viewport.height / 720, 0.78, 1.25);
      const headR = 7 * scale;
      const bodyH = 34 * scale;
      const shoulderY = footY - bodyH;
      const headY = shoulderY - headR * 1.35;

      // Because the layer order draws water before the child, clipping preserves
      // the "submerged by water" read without mixing placeholder layers.
      ctx.beginPath();
      ctx.rect(0, 0, viewport.width, waterY);
      ctx.clip();

      ctx.fillStyle = "rgba(236, 239, 235, 0.88)";
      ctx.beginPath();
      ctx.arc(x + 3 * scale, headY, headR, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "rgba(30, 38, 42, 0.62)";
      ctx.beginPath();
      ctx.moveTo(x - 6 * scale, shoulderY);
      ctx.lineTo(x + 12 * scale, shoulderY - 2 * scale);
      ctx.lineTo(x + 17 * scale, footY - 4 * scale);
      ctx.lineTo(x - 3 * scale, footY);
      ctx.closePath();
      ctx.fill();

      ctx.strokeStyle = "rgba(30, 38, 42, 0.58)";
      ctx.lineWidth = 2 * scale;
      ctx.lineCap = "round";
      ctx.beginPath();
      ctx.moveTo(x + 12 * scale, shoulderY + 4 * scale);
      ctx.lineTo(x + 24 * scale, shoulderY + 13 * scale);
      ctx.stroke();

      ctx.strokeStyle = "rgba(236, 239, 235, 0.74)";
      ctx.lineWidth = 1 * scale;
      ctx.beginPath();
      ctx.moveTo(x + 8 * scale, headY - 5 * scale);
      ctx.lineTo(x + 16 * scale, headY - 1 * scale);
      ctx.stroke();

      drawDrone(x - 20 * scale, headY - 16 * scale + Math.sin(time * 0.0017) * 2, time);
      ctx.restore();
    }

    function drawDrone(x, y, time) {
      const bob = Math.sin(time * 0.002) * 2;
      ctx.save();
      ctx.translate(x, y + bob);
      ctx.fillStyle = "rgba(214, 222, 222, 0.84)";
      ctx.strokeStyle = "rgba(73, 91, 98, 0.55)";
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.arc(0, 0, 8, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = "rgba(83, 104, 113, 0.58)";
      ctx.beginPath();
      ctx.arc(3, -1, 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = "rgba(232, 233, 230, 0.35)";
      ctx.beginPath();
      ctx.moveTo(-14, -2);
      ctx.lineTo(-8, 0);
      ctx.moveTo(8, 0);
      ctx.lineTo(14, -2);
      ctx.stroke();
      ctx.restore();
    }

    function drawLogoLayer(y, logoOpacity, time) {
      // LAYER 07: logo. Placeholder text only; final will be webfont or image.
      // REPLACE: draw ART_HOOKS.logo here.
      const profile = sanityProfile();
      const baseAlpha = logoOpacity * profile.logoOpacity;
      if (baseAlpha <= 0.001) return;

      ctx.save();
      ctx.globalAlpha = baseAlpha;

      if (profile.stage === "nameSlip") {
        const beat = Math.sin(time * 0.0032);
        drawLogoPass(y + beat * 1.5, time, profile, 1, 0, 0);
        drawLogoPass(y + 3 + beat * 4, time + 130, profile, 0.38 * profile.slip, 8 + beat * 7, -2);
      } else {
        drawLogoPass(y, time, profile, 1, 0, 0);
      }

      ctx.restore();
    }

    function drawLogoPass(y, time, profile, passAlpha, offsetX, offsetY) {
      ctx.save();
      ctx.globalAlpha *= passAlpha;
      ctx.translate(offsetX, offsetY);

      /*
        Real production swap point:
        replace this system CJK serif stack with a licensed 예서/clerical-script
        webfont, then keep the same erosion/jitter treatment below.
      */
      const fontSize = layout.logoSize;
      ctx.font = `600 ${fontSize}px "Yu Mincho", "MS Mincho", "Batang", "Noto Serif CJK KR", "Songti SC", serif`;
      ctx.textAlign = "left";
      ctx.textBaseline = "alphabetic";

      const glyphs = TITLE_GLYPHS;
      const gap = fontSize * 0.08;
      const widths = glyphs.map((glyph) => glyph === " " ? fontSize * 0.34 : ctx.measureText(glyph).width);
      const totalWidth = widths.reduce((sum, width) => sum + width, 0) + gap * (glyphs.length - 1);
      let x = layout.cx - totalWidth * 0.5;

      const alphaBefore = ctx.globalAlpha;

      for (let i = 0; i < glyphs.length; i += 1) {
        const glyph = glyphs[i];
        if (glyph !== " ") {
          const jitterX = lowJitter(time, i, 0) * profile.jitter;
          const jitterY = lowJitter(time, i, 4) * profile.jitter;
          const gx = x + jitterX;
          const gy = y + jitterY;

          ctx.globalAlpha = alphaBefore;
          ctx.fillStyle = logoFillForGlyph(glyph, gy - fontSize, gy + 8);
          ctx.fillText(glyph, gx, gy);

          if (profile.submerge > 0) {
            drawLogoSubmerge(gx, gy, widths[i], fontSize, profile, time, i);
          }
        }
        x += widths[i] + gap;
      }

      drawKoreanLabel(y + fontSize * 0.42, time, profile);
      ctx.restore();
    }

    function logoFillForGlyph(glyph, top, bottom) {
      // SYSTEM: letting-go ending keeps only the final "明" warm/gold.
      if (saveState.reachedLettingGoEnding && glyph === LETTING_GO_GLYPH) {
        const gold = ctx.createLinearGradient(0, top, 0, bottom);
        gold.addColorStop(0, "#d89b4a");
        gold.addColorStop(0.5, "#ecc983");
        gold.addColorStop(1, "#f8e4b0");
        return gold;
      }
      return "#e8e9e6";
    }

    function drawLogoSubmerge(x, baseline, width, fontSize, profile, time, index) {
      /*
        Placeholder for sanity-driven stroke loss. Final logo art can replace
        this with masks, alternate logo frames, or pre-rendered eroded images.
      */
      ctx.save();
      const top = baseline - fontSize * (0.35 + profile.submerge * 0.34);
      const bandCount = 3;
      for (let i = 0; i < bandCount; i += 1) {
        const y = top + i * fontSize * 0.16 + Math.sin(time * 0.001 + index + i) * 1.5;
        ctx.globalAlpha *= 0.24 + profile.submerge * 0.34;
        ctx.fillStyle = "rgba(151, 177, 188, 0.78)";
        ctx.fillRect(x - 3, y, width + 7, fontSize * (0.055 + profile.submerge * 0.025));
      }
      ctx.restore();
    }

    function drawKoreanLabel(y, time, profile) {
      const text = KOREAN_TITLE;
      const size = layout.koreanSize;
      ctx.save();
      ctx.font = `300 ${size}px Consolas, "D2Coding", "Cascadia Mono", monospace`;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillStyle = "rgba(232, 233, 230, 0.82)";
      const jitterX = lowJitter(time, 9, 2) * profile.jitter * 0.35;
      const jitterY = lowJitter(time, 7, 3) * profile.jitter * 0.22;
      ctx.fillText(text, layout.cx + jitterX, y + jitterY);
      ctx.restore();
    }

    function lowJitter(time, seed, phase) {
      return (
        Math.sin(time * 0.00115 + seed * 2.17 + phase) * 0.7 +
        Math.sin(time * 0.00041 + seed * 4.71 + phase * 1.8) * 0.3
      );
    }

    function render(now) {
      resizeCanvas();
      const elapsed = now - startedAt;
      const progress = bootProgress(elapsed);
      const width = viewport.width;
      const height = viewport.height;

      ctx.fillStyle = "#000";
      ctx.fillRect(0, 0, width, height);

      if (screenMode === "connecting" && droneConnectStartedAt !== null && now - droneConnectStartedAt >= CONNECT_SEQUENCE.hubFadeEnd) {
        completeEnterGame();
      }

      if (screenMode === "connecting") {
        drawDroneConnectTransition(width, height, now);
      } else if (screenMode === "shelter") {
        drawShelterViewLayer(width, height, now);
      } else if (screenMode === "stage-placeholder") {
        drawStagePlaceholderLayer(width, height, now);
      } else {
        // Title CCTV draw order, back to front:
        // selected channel still -> facility state animation -> death flood overlay ->
        // sanity ghost -> CCTV filter/HUD/glitch -> logo. Menu/UI is DOM overlay.
        drawCctvModeLayer(width, height, progress.background, now);

        const logoY = lerp(layout.logoStartY, layout.logoEndY, progress.logoRise);
        drawLogoLayer(logoY, progress.logoFade, now);
      }

      updateDom(progress.menuIn);
      animationFrameId = requestAnimationFrame(render);
    }

    function updateDom(menuOpacity) {
      // LAYER 08: menu/UI. DOM overlay above every canvas layer.
      // Kept separate from art replacement path; final UI can restyle HTML/CSS.
      latestMenuOpacity = menuOpacity;
      const uiOpacity =
        screenMode === "title" ? menuOpacity :
        screenMode === "shelter" || screenMode === "stage-placeholder" ? 1 :
        0;
      const letCssBootRevealHandleUi = screenMode === "title" && uiOpacity <= 0.001;
      menu.style.animation = screenMode === "title" ? "" : "none";
      audioToggle.style.animation = screenMode === "title" ? "" : "none";
      menu.style.opacity = letCssBootRevealHandleUi ? "" : String(uiOpacity);
      menu.style.pointerEvents = letCssBootRevealHandleUi ? "" : (uiOpacity > 0.94 ? "auto" : "none");
      audioToggle.style.opacity = letCssBootRevealHandleUi ? "" : String(uiOpacity);
      audioToggle.style.pointerEvents = letCssBootRevealHandleUi ? "" : (uiOpacity > 0.94 ? "auto" : "none");

      const primaryButton = menu.querySelector("button[data-choice]");
      if (primaryButton) {
        if (screenMode === "shelter" || screenMode === "stage-placeholder") {
          primaryButton.dataset.choice = "return-title";
          primaryButton.textContent = "타이틀로";
          primaryButton.disabled = false;
        } else {
          primaryButton.dataset.choice = "new-game";
          primaryButton.textContent = "새로 시작";
          primaryButton.disabled = screenMode === "connecting";
        }
      }

      // SYSTEM: continue only exists when localStorage has a valid save.
      continueButton.disabled = screenMode === "connecting" || loadSave() === null;

      // SYSTEM: reachedLettingGoEnding gates the prompt overlay.
      const endingOpacity = saveState.reachedLettingGoEnding && screenMode === "title" ? uiOpacity : 0;
      endingPrompt.style.opacity = String(endingOpacity);
      endingPrompt.style.pointerEvents = endingOpacity > 0.94 ? "auto" : "none";
    }

    /*
      Title audio hook.
      Still Water Dawn.mp3 is the primary title BGM. It defaults to ON, but
      browser autoplay rules still require a real user interaction before playback can begin.
      The WebAudio ambience remains as a quiet procedural backing hook.
    */
    class AmbientAudio {
      constructor() {
        this.context = null;
        this.master = null;
        this.bgm = bgmAudio;
        this.isMuted = false;
        this.targetBgmVolume = 0.58;
        this.beepTimer = 0;
        if (this.bgm) {
          this.bgm.volume = this.targetBgmVolume;
          this.bgm.muted = false;
        }
        document.documentElement.dataset.audioContextStarted = "false";
        document.documentElement.dataset.audioMuted = "false";
      }

      ensureStarted() {
        this.startBgm();

        if (this.context) {
          this.context.resume();
          return;
        }

        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        if (!AudioContextClass) return;

        this.context = new AudioContextClass();
        this.master = this.context.createGain();
        this.master.gain.value = 0;
        this.master.connect(this.context.destination);
        document.documentElement.dataset.audioContextStarted = "true";

        this.createWaterNoise();
        this.createDroneHum();
        this.scheduleNextBeep();
        this.master.gain.setTargetAtTime(this.isMuted ? 0 : 0.8, this.context.currentTime, 0.18);
      }

      startBgm() {
        if (!this.bgm) return;
        this.bgm.muted = this.isMuted;
        this.bgm.volume = this.isMuted ? 0 : this.targetBgmVolume;

        const playPromise = this.bgm.play();
        if (playPromise && typeof playPromise.catch === "function") {
          playPromise
            .then(() => {
              window.__lastBgmPlayError = "";
            })
            .catch((error) => {
              window.__lastBgmPlayError = error ? `${error.name}: ${error.message}` : "audio play rejected";
              // Autoplay may be denied before direct interaction; toggle retries.
            });
        }
      }

      createWaterNoise() {
        const sampleRate = this.context.sampleRate;
        const buffer = this.context.createBuffer(1, sampleRate * 2, sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < data.length; i += 1) {
          data[i] = (Math.random() * 2 - 1) * 0.42;
        }

        const source = this.context.createBufferSource();
        source.buffer = buffer;
        source.loop = true;

        const filter = this.context.createBiquadFilter();
        filter.type = "lowpass";
        filter.frequency.value = 740;
        filter.Q.value = 0.45;

        const gain = this.context.createGain();
        gain.gain.value = 0.028;

        source.connect(filter);
        filter.connect(gain);
        gain.connect(this.master);
        source.start();
      }

      createDroneHum() {
        const hum = this.context.createOscillator();
        hum.type = "sine";
        hum.frequency.value = 58;

        const humGain = this.context.createGain();
        humGain.gain.value = 0.018;

        const tremolo = this.context.createOscillator();
        tremolo.type = "sine";
        tremolo.frequency.value = 0.08;

        const tremoloGain = this.context.createGain();
        tremoloGain.gain.value = 0.006;
        tremolo.connect(tremoloGain);
        tremoloGain.connect(humGain.gain);

        hum.connect(humGain);
        humGain.connect(this.master);
        hum.start();
        tremolo.start();
      }

      scheduleNextBeep() {
        window.clearTimeout(this.beepTimer);
        this.beepTimer = window.setTimeout(() => {
          this.playBeep();
          this.scheduleNextBeep();
        }, 9000 + Math.random() * 10000);
      }

      playBeep() {
        if (!this.context || this.isMuted) return;
        const now = this.context.currentTime;
        const osc = this.context.createOscillator();
        const gain = this.context.createGain();
        osc.type = "triangle";
        osc.frequency.setValueAtTime(760 + Math.random() * 80, now);
        gain.gain.setValueAtTime(0, now);
        gain.gain.linearRampToValueAtTime(0.025, now + 0.018);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.19);
        osc.connect(gain);
        gain.connect(this.master);
        osc.start(now);
        osc.stop(now + 0.22);
      }

      playSignalPullIn() {
        if (!this.context || !this.master || this.isMuted) return;
        const now = this.context.currentTime;
        const osc = this.context.createOscillator();
        const gain = this.context.createGain();
        const filter = this.context.createBiquadFilter();
        osc.type = "sawtooth";
        osc.frequency.setValueAtTime(980, now);
        osc.frequency.exponentialRampToValueAtTime(146, now + 1.35);
        filter.type = "bandpass";
        filter.frequency.setValueAtTime(1200, now);
        filter.frequency.exponentialRampToValueAtTime(240, now + 1.35);
        filter.Q.value = 7.5;
        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.exponentialRampToValueAtTime(0.045, now + 0.08);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 1.46);
        osc.connect(filter);
        filter.connect(gain);
        gain.connect(this.master);
        osc.start(now);
        osc.stop(now + 1.5);
      }

      playBootIris() {
        if (!this.context || !this.master || this.isMuted) return;
        const now = this.context.currentTime;
        const low = this.context.createOscillator();
        const high = this.context.createOscillator();
        const lowGain = this.context.createGain();
        const highGain = this.context.createGain();
        low.type = "sine";
        high.type = "triangle";
        low.frequency.setValueAtTime(48, now);
        low.frequency.exponentialRampToValueAtTime(92, now + 0.42);
        high.frequency.setValueAtTime(440, now);
        high.frequency.exponentialRampToValueAtTime(1180, now + 0.26);
        lowGain.gain.setValueAtTime(0.0001, now);
        lowGain.gain.exponentialRampToValueAtTime(0.055, now + 0.05);
        lowGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.62);
        highGain.gain.setValueAtTime(0.0001, now + 0.08);
        highGain.gain.exponentialRampToValueAtTime(0.02, now + 0.14);
        highGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.5);
        low.connect(lowGain);
        high.connect(highGain);
        lowGain.connect(this.master);
        highGain.connect(this.master);
        low.start(now);
        high.start(now + 0.04);
        low.stop(now + 0.68);
        high.stop(now + 0.56);
      }

      fadeToShelterTone() {
        this.targetBgmVolume = 0.34;
        if (this.bgm && !this.isMuted) this.bgm.volume = this.targetBgmVolume;
        if (!this.master || !this.context) return;
        const now = this.context.currentTime;
        this.master.gain.cancelScheduledValues(now);
        this.master.gain.setTargetAtTime(this.isMuted ? 0 : 0.56, now, 0.42);
      }

      restoreTitleTone() {
        this.targetBgmVolume = 0.58;
        if (this.bgm && !this.isMuted) this.bgm.volume = this.targetBgmVolume;
        if (!this.master || !this.context) return;
        const now = this.context.currentTime;
        this.master.gain.cancelScheduledValues(now);
        this.master.gain.setTargetAtTime(this.isMuted ? 0 : 0.8, now, 0.18);
      }

      setMuted(nextMuted) {
        this.isMuted = nextMuted;
        this.ensureStarted();
        if (this.bgm) {
          this.bgm.muted = this.isMuted;
          this.bgm.volume = this.isMuted ? 0 : this.targetBgmVolume;
        }
        audioToggle.textContent = this.isMuted ? "소리 꺼짐" : "소리 켜짐";
        document.documentElement.dataset.audioMuted = String(this.isMuted);

        if (!this.master || !this.context) return;
        const now = this.context.currentTime;
        this.master.gain.cancelScheduledValues(now);
        this.master.gain.setTargetAtTime(this.isMuted ? 0 : 0.8, now, 0.08);
      }

      toggle() {
        this.setMuted(!this.isMuted);
      }

      stop() {
        window.clearTimeout(this.beepTimer);
        if (this.bgm) {
          this.bgm.pause();
          this.bgm.currentTime = 0;
        }
        if (this.master && this.context) {
          this.master.gain.cancelScheduledValues(this.context.currentTime);
          this.master.gain.value = 0;
        }
        if (this.context) {
          this.context.suspend();
        }
      }
    }

    const ambientAudio = new AmbientAudio();

    function buildManagerControls() {
      managerControls.innerHTML = "";
      for (const channel of CCTV_CHANNELS) {
        const label = document.createElement("label");
        label.className = "manager-row";

        const span = document.createElement("span");
        span.textContent = channel.code;

        const select = document.createElement("select");
        select.id = `manager${channel.key}`;
        select.dataset.channel = channel.key;
        select.setAttribute("aria-label", `${channel.code} manager state`);
        for (const state of MANAGER_STATES) {
          const option = document.createElement("option");
          option.value = state;
          option.textContent = state;
          select.appendChild(option);
        }

        label.appendChild(span);
        label.appendChild(select);
        managerControls.appendChild(label);
      }
    }

    function syncDevPanel() {
      ensureManagerState();
      const deaths = Math.max(0, Math.floor(Number(saveState.deaths) || 0));
      const sanity = clamp(Math.floor(Number(saveState.sanity) || 0), 0, 100);
      saveState.deaths = deaths;
      saveState.sanity = sanity;

      deathsRange.value = String(clamp(deaths, 0, Number(deathsRange.max)));
      deathsNumber.value = String(deaths);
      sanityRange.value = String(sanity);
      sanityNumber.value = String(sanity);
      endingCheckbox.checked = Boolean(saveState.reachedLettingGoEnding);
      continueButton.disabled = loadSave() === null;

      for (const channel of CCTV_CHANNELS) {
        const select = document.getElementById(`manager${channel.key}`);
        if (select) select.value = saveState.managers[channel.key];
      }
      syncDebugDataset();
    }

    function revealTitleUiIfBootComplete() {
      if (screenMode === "title" && performance.now() - startedAt >= BOOT.menuFadeEnd) {
        updateDom(1);
      }
    }

    function setDeaths(value) {
      saveState.deaths = Math.max(0, Math.floor(Number(value) || 0));
      syncDevPanel();
    }

    function setSanity(value) {
      saveState.sanity = clamp(Math.floor(Number(value) || 0), 0, 100);
      syncDevPanel();
    }

    function applyStateFromUrl() {
      const params = new URLSearchParams(window.location.search);
      if (params.has("deaths")) saveState.deaths = Math.max(0, Math.floor(Number(params.get("deaths")) || 0));
      if (params.has("sanity")) saveState.sanity = clamp(Math.floor(Number(params.get("sanity")) || 0), 0, 100);
      if (params.has("ending")) saveState.reachedLettingGoEnding = params.get("ending") === "1" || params.get("ending") === "true";
      ensureManagerState();
      for (const channel of CCTV_CHANNELS) {
        const state = params.get(channel.key);
        if (MANAGER_STATES.includes(state)) saveState.managers[channel.key] = state;
      }
    }

    function applySaveToDisplay(state) {
      const next = normalizeSave(state, Boolean(state?.exists));
      saveState.deaths = next.deaths;
      saveState.sanity = next.sanity;
      saveState.reachedLettingGoEnding = next.reachedLettingGoEnding;
      saveState.managers = { ...next.managers };
      saveState.stage = next.stage;
      saveState.exists = next.exists;
      saveState.entryIntent = next.entryIntent;
      syncDevPanel();
    }

    function setOverwritePromptOpen(open) {
      overwritePromptOpen = Boolean(open);
      overwritePrompt.classList.toggle("is-open", overwritePromptOpen);
      overwritePrompt.setAttribute("aria-hidden", overwritePromptOpen ? "false" : "true");
      document.documentElement.dataset.overwritePrompt = overwritePromptOpen ? "open" : "closed";
      if (overwritePromptOpen) {
        window.setTimeout(() => {
          overwritePrompt.querySelector("[data-overwrite-choice='confirm']")?.focus();
        }, 0);
      }
    }

    function startFreshGameFromTitle() {
      setOverwritePromptOpen(false);
      const fresh = saveGame({ ...DEFAULT_SAVE, entryIntent: "new" });
      applySaveToDisplay(fresh);
      enterGame(fresh);
    }

    function shouldLaunchGameplayImmediately() {
      const params = new URLSearchParams(window.location.search);
      return (
        params.get("directLevel") === "1" ||
        params.get("mode") === "level-test" ||
        params.has("shelterCgPreview") ||
        params.get("partsLoop") === "1"
      );
    }

    async function launchGameplay(intent, options = {}) {
      if (gameBootPromise) return gameBootPromise;

      screenMode = "game";
      document.documentElement.dataset.screenMode = screenMode;
      document.documentElement.dataset.droneConnect = options.immediate ? "skipped" : "complete";
      document.documentElement.dataset.gameLaunchMode = intent;

      setOverwritePromptOpen(false);
      window.clearTimeout(menuRevealFallbackTimer);
      window.clearTimeout(connectCompletionTimer);
      if (animationFrameId !== null) {
        cancelAnimationFrame(animationFrameId);
        animationFrameId = null;
      }

      ambientAudio.stop();
      canvas.hidden = true;
      menu.hidden = true;
      audioToggle.hidden = true;
      endingPrompt.hidden = true;
      devPanel.hidden = true;
      gameRoot.hidden = false;
      gameRoot.setAttribute("aria-hidden", "false");
      document.body.classList.add("is-game-running");
      document.title = "윤회무명2";

      gameBootPromise = import(GAME_MODULE_PATH)
        .then(() => {
          document.documentElement.dataset.gameModuleLoaded = "true";
        })
        .catch((error) => {
          document.documentElement.dataset.gameModuleError = error ? `${error.name}: ${error.message}` : "unknown";
          console.error("Gameplay module failed to load", error);
        });

      return gameBootPromise;
    }

    function createShelterEntryUrl(intent) {
      const params = new URLSearchParams();
      params.set("entry", intent);
      params.set("arrival", "drone-wake");
      return `${SHELTER_ENTRY_PATH}?${params.toString()}`;
    }

    function enterGame(state) {
      const next = normalizeSave(state, true);
      pendingEnterState = next;
      entryCompletionStarted = false;
      screenMode = "connecting";
      droneConnectStartedAt = performance.now();
      shelterArrivedAt = null;
      connectBootCuePlayed = false;
      connectFocusCuePlayed = false;
      document.documentElement.dataset.screenMode = screenMode;
      document.documentElement.dataset.droneConnect = "started";
      console.log("enterGame state:", next);
      ambientAudio.ensureStarted();
      ambientAudio.playSignalPullIn();
      syncDebugDataset();
      updateDom(latestMenuOpacity);
      window.clearTimeout(connectCompletionTimer);
      connectCompletionTimer = window.setTimeout(() => {
        completeEnterGame();
      }, CONNECT_SEQUENCE.hubFadeEnd + 120);
    }

    async function completeEnterGame() {
      if (entryCompletionStarted || !pendingEnterState) return;
      window.clearTimeout(connectCompletionTimer);
      connectCompletionTimer = null;
      entryCompletionStarted = true;
      const state = pendingEnterState;
      const intent = state.entryIntent === "continue" ? "continue" : "new";
      window.location.href = createShelterEntryUrl(intent);
    }

    menu.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-choice]");
      if (!button || button.disabled) return;
      if (button.dataset.choice === "new-game") {
        const existing = loadSave();
        if (existing) {
          setOverwritePromptOpen(true);
          ambientAudio.ensureStarted();
          return;
        }
        startFreshGameFromTitle();
      } else if (button.dataset.choice === "continue") {
        const loaded = loadSave();
        if (!loaded) return;
        const continuing = saveGame({ ...loaded, entryIntent: "continue" });
        applySaveToDisplay(continuing);
        enterGame(continuing);
      } else if (button.dataset.choice === "return-title") {
        screenMode = "title";
        droneConnectStartedAt = null;
        shelterArrivedAt = null;
        pendingEnterState = null;
        entryCompletionStarted = false;
        connectBootCuePlayed = false;
        connectFocusCuePlayed = false;
        window.clearTimeout(connectCompletionTimer);
        connectCompletionTimer = null;
        document.documentElement.dataset.screenMode = screenMode;
        document.documentElement.dataset.droneConnect = "idle";
        ambientAudio.restoreTitleTone();
        syncDebugDataset();
        updateDom(latestMenuOpacity);
      }
      console.log("title menu:", button.dataset.choice);
      ambientAudio.ensureStarted();
    });
    menu.addEventListener("keydown", (event) => {
      if (event.key !== "Enter" && event.key !== " ") return;
      const button = event.target.closest("button[data-choice]");
      if (!button || button.disabled) return;
      event.preventDefault();
      button.click();
    });

    endingPrompt.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-ending-choice]");
      if (!button) return;
      console.log("ending prompt:", button.dataset.endingChoice);
      ambientAudio.ensureStarted();
    });

    overwritePrompt.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-overwrite-choice]");
      if (!button) return;
      ambientAudio.ensureStarted();
      if (button.dataset.overwriteChoice === "confirm") {
        startFreshGameFromTitle();
        return;
      }
      setOverwritePromptOpen(false);
    });

    overwritePrompt.addEventListener("keydown", (event) => {
      if (!overwritePromptOpen) return;
      if (event.key === "Escape") {
        event.preventDefault();
        setOverwritePromptOpen(false);
      }
    });

    audioToggle.addEventListener("pointerdown", (event) => {
      event.preventDefault();
      event.stopPropagation();
      ambientAudio.toggle();
    });
    audioToggle.addEventListener("click", (event) => {
      if (event.detail !== 0) return;
      ambientAudio.toggle();
    });

    deathsRange.addEventListener("input", () => setDeaths(deathsRange.value));
    deathsNumber.addEventListener("input", () => setDeaths(deathsNumber.value));
    sanityRange.addEventListener("input", () => setSanity(sanityRange.value));
    sanityNumber.addEventListener("input", () => setSanity(sanityNumber.value));
    endingCheckbox.addEventListener("change", () => {
      saveState.reachedLettingGoEnding = endingCheckbox.checked;
      syncDevPanel();
    });
    managerControls.addEventListener("change", (event) => {
      const select = event.target.closest("select[data-channel]");
      if (!select) return;
      ensureManagerState();
      saveState.managers[select.dataset.channel] = select.value;
      syncDevPanel();
    });
    window.addEventListener("title-dev-state", (event) => {
      const detail = event.detail || {};
      if (Object.prototype.hasOwnProperty.call(detail, "deaths")) setDeaths(detail.deaths);
      if (Object.prototype.hasOwnProperty.call(detail, "sanity")) setSanity(detail.sanity);
      if (Object.prototype.hasOwnProperty.call(detail, "reachedLettingGoEnding")) {
        saveState.reachedLettingGoEnding = Boolean(detail.reachedLettingGoEnding);
      }
      if (detail.managers) {
        ensureManagerState();
        for (const channel of CCTV_CHANNELS) {
          if (MANAGER_STATES.includes(detail.managers[channel.key])) {
            saveState.managers[channel.key] = detail.managers[channel.key];
          }
        }
      }
      syncDevPanel();
    });

    window.addEventListener("resize", resizeCanvas);
    window.addEventListener("focus", revealTitleUiIfBootComplete);
    document.addEventListener("visibilitychange", revealTitleUiIfBootComplete);

    window.addEventListener("pointerdown", () => {
      if (screenMode !== "game") ambientAudio.ensureStarted();
    }, { once: true });
    window.addEventListener("keydown", (event) => {
      if (screenMode === "game") return;
      ambientAudio.ensureStarted();
      if (overwritePromptOpen) {
        if (event.key === "Escape") {
          event.preventDefault();
          setOverwritePromptOpen(false);
        }
        return;
      }
      if (event.target instanceof HTMLInputElement) return;
      if (event.target instanceof HTMLSelectElement) return;

      const key = event.key.toLowerCase();
      if (event.shiftKey && key === "d") {
        devPanel.classList.toggle("is-open");
        event.preventDefault();
        return;
      }
      if (key === "d") {
        cycleCctvChannel(1, performance.now());
        devPanel.classList.toggle("is-open");
        event.preventDefault();
        return;
      }
      if (event.key === "ArrowRight") {
        cycleCctvChannel(1, performance.now());
        event.preventDefault();
        return;
      }
      if (event.key === "ArrowLeft" || key === "a") {
        cycleCctvChannel(-1, performance.now());
        event.preventDefault();
      }
    });

    applyStateFromUrl();
    buildManagerControls();
    syncDevPanel();
    resizeCanvas();
    if (shouldLaunchGameplayImmediately()) {
      launchGameplay("direct", { immediate: true });
    } else {
      animationFrameId = requestAnimationFrame(render);
      menuRevealFallbackTimer = window.setTimeout(() => {
        revealTitleUiIfBootComplete();
      }, BOOT.menuFadeEnd + 200);
    }
  </script>
</body>
</html>
